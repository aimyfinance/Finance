                <span className="text-xs font-medium" style={{ color: "var(--text-dim)" }}>1 {c} =</span>
                <div className="flex items-center gap-2">
                  <button onClick={() => toggleRateMode(c)} className="text-[10px] font-semibold px-1.5 py-0.5 rounded-md" style={localRateMode[c] === "manual" ? { background: "var(--surface2)", color: "var(--text-dim)", border: "1px solid var(--border)" } : { background: "var(--accent)", color: "var(--accent-ink)" }}>{localRateMode[c] === "manual" ? tr("Вручну") : tr("Авто")}</button>
                  <button onClick={() => removeCurrency(c)} className="text-[11px] font-medium" style={{ color: "var(--danger)" }}>{tr("Прибрати")}</button>
                </div>
              </div>
              <Input type="number" step="0.0001" inputMode="decimal" value={localRates[c] ?? ""} onChange={(e) => setLocalRates({ ...localRates, [c]: e.target.value })} placeholder="0" />
            </div>
          ))}
        </div>
        {addableCurs.length > 0 && (
          <div className="flex gap-2 items-end mt-3">
            <div className="flex-1 min-w-0">
              <span className="text-[11px] font-medium mb-1 block" style={{ color: "var(--text-dim)" }}>{tr("Додати валюту")}</span>
              <Select value={addCur} onChange={(e) => setAddCur(e.target.value)}>
                <option value="">{tr("— оберіть валюту —")}</option>
                {addableCurs.map((c) => <option key={c} value={c}>{c}</option>)}
              </Select>
            </div>
            <Button variant="secondary" onClick={addCurrency} disabled={!addCur}><Plus size={15} /> {tr("Додати")}</Button>
          </div>
        )}

        <div className="mt-4 pt-4" style={{ borderTop: "1px solid var(--border)" }}>
          <p className="text-xs font-semibold mb-2" style={{ color: "var(--text)" }}>{tr("Крос-курс валют")}</p>
          <div className="flex items-center gap-2">
            <Select value={crossFrom} onChange={(e) => setCrossFrom(e.target.value)} className="flex-1">{activeCurs.map((c) => <option key={c} value={c}>{c}</option>)}</Select>
            <ArrowUpRight size={16} style={{ color: "var(--text-dim)", transform: "rotate(45deg)" }} />
            <Select value={crossTo} onChange={(e) => setCrossTo(e.target.value)} className="flex-1">{activeCurs.map((c) => <option key={c} value={c}>{c}</option>)}</Select>
          </div>
          <p className="text-sm mt-2 font-semibold tabular" style={{ color: "var(--accent)" }}>
            {crossRate > 0 ? `1 ${crossFrom} = ${crossRate.toLocaleString(locale(), { maximumFractionDigits: 4 })} ${crossTo}` : tr("Вкажіть курси обох валют, щоб побачити крос-курс")}
          </p>
        </div>

        <Button onClick={save} className="mt-4">{tr("Зберегти налаштування")}</Button>
      </Card>

      <Card className="p-5">
        <h3 className="font-display font-semibold text-sm mb-1">{tr("Зворотний зв'язок")}</h3>
        <p className="text-xs mb-3" style={{ color: "var(--text-dim)" }}>{tr("Поділіться побажанням, ідеєю чи повідомте про проблему — ми будемо вдячні за ваш відгук.")}</p>
        <Textarea rows={3} value={feedback} onChange={(e) => setFeedback(e.target.value)} placeholder={tr("Ваш відгук або побажання…")} />
        <Button className="mt-2" onClick={sendFeedback} disabled={!feedback.trim()}><ArrowUpRight size={15} /> {tr("Надіслати відгук")}</Button>
      </Card>

      <Card className="p-5">
        <button onClick={() => setShowTerms(!showTerms)} className="w-full flex items-center justify-between text-left">
          <span className="font-display font-semibold text-sm">{tr("Угода користувача та конфіденційність")}</span>
          {showTerms ? <ChevronDown size={18} style={{ color: "var(--text-dim)" }} /> : <ChevronRight size={18} style={{ color: "var(--text-dim)" }} />}
        </button>
        {showTerms && (
          <div className="mt-3">
            <AgreementText />
          </div>
        )}
      </Card>
    </div>
  );
}

/* ============================== MODAL ROUTER ============================== */

function ModalRouter({ modal, setModal, accounts, pockets, categories, rates, baseCurrency, currencies, addAccountWithPocket, editAccount, addPocket, editPocket, archivePocket, deleteAccount, deletePocket, movePocket, addCategory, editCategory, addTransaction, editTransaction, addLoan, registerLoanReturn, editLoan, loans, loanRemaining, getPocket, pocketBalance, pocketLabel, transactions, deleteTransaction, duplicateTransaction, reminders, addReminder, editReminder, deleteReminder, toggleReminderDone, addGoal, editGoal, deleteGoal, contributeGoal, startTour, addCrypto, editCrypto, deleteCrypto }) {
  const close = () => setModal(null);
  if (modal.type === "account") return <AccountModal onClose={close} existing={modal.payload} addAccountWithPocket={addAccountWithPocket} editAccount={editAccount} currencies={currencies} />;
  if (modal.type === "pocket") return <PocketModal onClose={close} accountId={modal.payload.accountId} existing={modal.payload.existing} accounts={accounts} pockets={pockets} addPocket={addPocket} editPocket={editPocket} currencies={currencies} />;
  if (modal.type === "cardMenu") return <CardMenuModal onClose={close} pocketId={modal.payload} pockets={pockets} getPocket={getPocket} setModal={setModal} archivePocket={archivePocket} deletePocket={deletePocket} movePocket={movePocket} />;
  if (modal.type === "category") return <CategoryModal onClose={close} existing={modal.payload} addCategory={addCategory} editCategory={editCategory} />;
  if (modal.type === "transaction") return <TransactionModal onClose={close} kind={modal.payload.kind} editing={modal.payload.editing} presetPocketId={modal.payload.presetPocketId} accounts={accounts} pockets={pockets} categories={categories} addTransaction={addTransaction} editTransaction={editTransaction} />;
  if (modal.type === "transfer") return <TransferExchangeModal onClose={close} mode="transfer" presetFromPocketId={modal.payload?.presetPocketId} accounts={accounts} pockets={pockets} rates={rates} addTransaction={addTransaction} />;
  if (modal.type === "exchange") return <TransferExchangeModal onClose={close} mode="exchange" presetFromPocketId={modal.payload?.presetPocketId} accounts={accounts} pockets={pockets} rates={rates} addTransaction={addTransaction} />;
  if (modal.type === "loan") return <LoanModal onClose={close} accounts={accounts} pockets={pockets} addLoan={addLoan} direction={(modal.payload && modal.payload.direction) || "out"} />;
  if (modal.type === "loanReturn") return <LoanReturnModal onClose={close} loan={modal.payload} accounts={accounts} pockets={pockets} registerLoanReturn={registerLoanReturn} loanRemaining={loanRemaining} />;
  if (modal.type === "loanEdit") return <LoanEditModal onClose={close} loan={modal.payload} editLoan={editLoan} />;
  if (modal.type === "pocketDetail") return <PocketDetailModal pocketId={modal.payload} onClose={close} getPocket={getPocket} pocketBalance={pocketBalance} pocketLabel={pocketLabel} transactions={transactions} categories={categories} setModal={setModal} editTransaction={editTransaction} deleteTransaction={deleteTransaction} duplicateTransaction={duplicateTransaction} archivePocket={archivePocket} />;
  if (modal.type === "reminders") return <RemindersModal onClose={close} reminders={reminders} addReminder={addReminder} editReminder={editReminder} deleteReminder={deleteReminder} toggleReminderDone={toggleReminderDone} currencies={currencies} />;
  if (modal.type === "goal") return <GoalModal onClose={close} existing={modal.payload} addGoal={addGoal} editGoal={editGoal} deleteGoal={deleteGoal} currencies={currencies} />;
  if (modal.type === "goalContribute") return <GoalContributeModal onClose={close} goal={modal.payload} contributeGoal={contributeGoal} />;
  if (modal.type === "help") return <HelpModal onClose={close} startTour={startTour} />;
  if (modal.type === "crypto") return <CryptoModal onClose={close} existing={modal.payload} addCrypto={addCrypto} editCrypto={editCrypto} deleteCrypto={deleteCrypto} />;
  return null;
}

/* ---------- Reminders (bell) ---------- */
function RemindersModal({ onClose, reminders, addReminder, editReminder, deleteReminder, toggleReminderDone, currencies }) {
  const [editing, setEditing] = useState(null); // null | "new" | reminder object
  const [title, setTitle] = useState("");
  const [date, setDate] = useState(new Date().toISOString().slice(0, 10));
  const [amount, setAmount] = useState("");
  const [currency, setCurrency] = useState("UAH");
  const [note, setNote] = useState("");
  const [error, setError] = useState("");

  const openNew = () => { setEditing("new"); setTitle(""); setDate(new Date().toISOString().slice(0, 10)); setAmount(""); setCurrency("UAH"); setNote(""); setError(""); };
  const openEdit = (r) => { setEditing(r); setTitle(r.title); setDate(r.date); setAmount(r.amount != null ? String(r.amount) : ""); setCurrency(r.currency || "UAH"); setNote(r.note || ""); setError(""); };
  const cancel = () => setEditing(null);

  const submit = () => {
    if (!title.trim()) return setError(tr("Введіть назву нагадування"));
    if (!date) return setError(tr("Оберіть дату"));
    const data = { title: title.trim(), date, amount: amount === "" ? null : parseFloat(amount) || 0, currency, note: note.trim() };
    if (editing === "new") addReminder(data); else editReminder(editing.id, data);
    setEditing(null);
  };

  const today = new Date(new Date().setHours(0, 0, 0, 0));
  const sorted = [...reminders].sort((a, b) => {
    if (a.done !== b.done) return a.done ? 1 : -1;
    return new Date(a.date) - new Date(b.date);
  });

  return (
    <div className="fixed inset-0 z-50 overflow-y-auto animate-in" style={{ background: "var(--bg)" }}>
      <div className="sticky top-0 z-10 flex items-center justify-between px-5 border-b" style={{ background: "var(--bg)", borderColor: "var(--border)", paddingTop: "calc(1rem + env(safe-area-inset-top))", paddingBottom: "1rem" }}>
        <h1 className="font-display font-bold text-xl flex items-center gap-2"><Bell size={20} /> {tr("Нагадування")}</h1>
        <button onClick={onClose} className="p-2 rounded-lg" style={{ color: "var(--text-dim)" }}><X size={20} /></button>
      </div>

      <div className="px-5 py-5 max-w-xl mx-auto space-y-4">
        {editing ? (
          <Card className="p-5">
            <h3 className="font-display font-semibold text-sm mb-3">{editing === "new" ? tr("Нове нагадування") : tr("Редагувати нагадування")}</h3>
            <Field label={tr("Що зробити")} error={error}><Input value={title} onChange={(e) => { setTitle(e.target.value); setError(""); }} placeholder={tr("Напр. Оплатити прибиральницю")} /></Field>
            <Field label={tr("Дата")}><Input type="date" value={date} onChange={(e) => setDate(e.target.value)} /></Field>
            <Field label={tr("Сума (необов'язково)")}>
              <div className="flex gap-2">
                <div className="flex-1 min-w-0"><Input type="number" step="0.01" inputMode="decimal" value={amount} onChange={(e) => setAmount(e.target.value)} placeholder="0" /></div>
                <div className="w-20 shrink-0"><Select value={currency} onChange={(e) => setCurrency(e.target.value)}>{(currencies || CURRENCIES).map((c) => <option key={c} value={c}>{c}</option>)}</Select></div>
              </div>
            </Field>
            <Field label={tr("Коментар")}><Textarea rows={2} value={note} onChange={(e) => setNote(e.target.value)} placeholder={tr("Необов'язково")} /></Field>
            <div className="flex gap-2 mt-1">
              <Button onClick={submit} className="flex-1">{editing === "new" ? tr("Створити") : tr("Зберегти")}</Button>
              <Button variant="secondary" onClick={cancel}>{tr("Скасувати")}</Button>
            </div>
          </Card>
        ) : (
          <Button onClick={openNew} className="w-full"><Plus size={16} /> {tr("Нове нагадування")}</Button>
        )}

        <div className="space-y-2">
          {sorted.map((r) => {
            const days = daysBetween(new Date(), r.date);
            const overdue = !r.done && new Date(r.date) < today;
            return (
              <Card key={r.id} className={`p-4 ${r.done ? "opacity-50" : ""}`} style={overdue ? { borderColor: "var(--danger)" } : {}}>
                <div className="flex items-start gap-3">
                  <button onClick={() => toggleReminderDone(r.id)} className="mt-0.5 w-5 h-5 rounded-full border flex items-center justify-center shrink-0" style={{ borderColor: r.done ? "var(--accent)" : "var(--border)", background: r.done ? "var(--accent)" : "transparent" }}>
                    {r.done && <Check size={12} color="#08110D" />}
                  </button>
                  <div className="flex-1 min-w-0">
                    <p className={`text-sm font-medium ${r.done ? "line-through" : ""}`} style={{ color: "var(--text)" }}>{tr(r.title)}</p>
                    <p className="text-xs mt-0.5" style={{ color: overdue ? "var(--danger)" : "var(--text-dim)" }}>
                      {fmtDate(r.date)}
                      {r.amount != null ? ` · ${fmtMoney(r.amount, r.currency)}` : ""}
                      {!r.done ? ` · ${days === 0 ? tr("сьогодні") : days > 0 ? tr(`через ${days} дн.`) : tr(`прострочено на ${Math.abs(days)} дн.`)}` : ""}
                    </p>
                    {r.note ? <p className="text-xs mt-1" style={{ color: "var(--text-dim)" }}>{tr(r.note)}</p> : null}
                  </div>
                  <div className="flex items-center gap-1 shrink-0">
                    <button onClick={() => openEdit(r)} className="p-1.5 rounded-lg" style={{ color: "var(--text-dim)" }}><Edit3 size={14} /></button>
                    <button onClick={() => deleteReminder(r.id)} className="p-1.5 rounded-lg" style={{ color: "var(--danger)" }}><Trash2 size={14} /></button>
                  </div>
                </div>
              </Card>
            );
          })}
          {sorted.length === 0 && <p className="text-sm text-center py-10" style={{ color: "var(--text-dim)" }}>{tr("Немає нагадувань")}</p>}
        </div>
      </div>
    </div>
  );
}

/* ---------- Pocket Detail (full-screen account view, Monobank-style) ---------- */
function RoundAction({ icon: Ic, label, onClick }) {
  return (
    <button onClick={onClick} className="flex flex-col items-center gap-2">
      <div className="mono-circle"><Ic size={18} color="#fff" /></div>
      <span className="text-[11px] font-medium text-center leading-tight" style={{ color: "var(--text-dim)" }}>{label}</span>
    </button>
  );
}

function PocketDetailModal({ pocketId, onClose, getPocket, pocketBalance, pocketLabel, transactions, categories, setModal, editTransaction, deleteTransaction, duplicateTransaction, archivePocket }) {
  const pocket = getPocket(pocketId);
  if (!pocket || !pocket.account) return null;
  const acc = pocket.account;
  const balance = pocketBalance(pocketId);

  const history = useMemo(() =>
    transactions
      .filter((t) => t.pocketId === pocketId || t.fromPocketId === pocketId || t.toPocketId === pocketId)
      .sort(byRecent),
  [transactions, pocketId]);

  return (
    <div className="fixed inset-0 z-50 overflow-y-auto animate-in" style={{ background: "var(--bg)" }}>
      <div className="relative px-5 pb-8" style={{ background: `linear-gradient(160deg, ${acc.color}, ${acc.color}66 78%, var(--bg))`, paddingTop: "calc(1.5rem + env(safe-area-inset-top))" }}>
        <button onClick={onClose} className="p-2 rounded-full mb-6" style={{ background: "rgba(0,0,0,0.18)" }}><X size={18} color="#fff" /></button>
        <p className="text-sm mb-1" style={{ color: "rgba(8,17,13,0.75)" }}>{tr(acc.name)} · {tr(ACCOUNT_TYPES.find((t) => t.id === acc.type)?.label)}</p>
        <h1 className="font-display font-extrabold text-4xl tabular" style={{ color: "#08110D" }}>{fmtMoney(balance, pocket.currency)}</h1>

        <div className="mt-6 max-w-sm">
          <PocketCard pocket={pocket} balance={balance} />
        </div>
      </div>

      <div className="px-5 pt-6">
        <div className="grid grid-cols-4 gap-2 mb-6">
          <RoundAction icon={Plus} label={tr("Дохід")} onClick={() => setModal({ type: "transaction", payload: { kind: "income", presetPocketId: pocketId } })} />
          <RoundAction icon={Minus} label={tr("Витрата")} onClick={() => setModal({ type: "transaction", payload: { kind: "expense", presetPocketId: pocketId } })} />
          <RoundAction icon={ArrowLeftRight} label={tr("Переказ")} onClick={() => setModal({ type: "transfer", payload: { presetPocketId: pocketId } })} />
          <RoundAction icon={RefreshCw} label={tr("Обмін")} onClick={() => setModal({ type: "exchange", payload: { presetPocketId: pocketId } })} />
        </div>

        <Card className="divide-y mb-4" style={{ borderColor: "var(--border)" }}>
          <div className="flex items-center justify-between px-4 py-3">
            <h3 className="font-display font-semibold text-sm">{tr("Операції по цьому рахунку")}</h3>
          </div>
          {history.map((tx) => (
            <div key={tx.id} className="flex items-center">
              <div className="flex-1 min-w-0"><TxRow tx={tx} categories={categories} pocketLabel={pocketLabel} /></div>
              <div className="flex items-center gap-2 pr-4 shrink-0">
                {(tx.type === "income" || tx.type === "expense") && (
                  <button onClick={() => setModal({ type: "transaction", payload: { kind: tx.type, editing: tx } })} className="p-1.5 rounded-lg" style={{ color: "var(--text-dim)" }}><Edit3 size={14} /></button>
                )}
                <button onClick={() => duplicateTransaction(tx)} className="p-1.5 rounded-lg" style={{ color: "var(--text-dim)" }}><Plus size={14} /></button>
                <button onClick={() => deleteTransaction(tx.id)} className="p-1.5 rounded-lg" style={{ color: "var(--danger)" }}><Trash2 size={14} /></button>
              </div>
            </div>
          ))}
          {history.length === 0 && <p className="text-sm py-8 text-center" style={{ color: "var(--text-dim)" }}>{tr("Ще немає операцій по цьому рахунку")}</p>}
        </Card>

        <button onClick={() => { archivePocket(pocketId); onClose(); }} className="w-full flex items-center justify-center gap-2 py-2.5 rounded-xl border text-xs font-medium mb-8" style={{ borderColor: "var(--border)", color: "var(--text-dim)" }}>
          <Archive size={14} /> {tr("Архівувати субрахунок")}
        </button>
      </div>
    </div>
  );
}

/* ---------- Card long-press menu ---------- */
function CardMenuModal({ onClose, pocketId, pockets, getPocket, setModal, archivePocket, deletePocket, movePocket }) {
  const pk = getPocket(pocketId);
  const [confirmDel, setConfirmDel] = useState(false);
  if (!pk || !pk.account) return null;
  const acc = pk.account;
  const active = pockets.filter((p) => !p.archived);
  const idx = active.findIndex((p) => p.id === pocketId);
  const canLeft = idx > 0;
  const canRight = idx >= 0 && idx < active.length - 1;

  const Row = ({ icon: Ic, label, onClick, danger, disabled }) => (
    <button onClick={onClick} disabled={disabled} className="w-full flex items-center gap-3 px-3 py-3 rounded-xl text-sm font-medium disabled:opacity-30" style={{ color: danger ? "var(--danger)" : "var(--text)", background: "transparent" }}>
      <Ic size={18} style={{ color: danger ? "var(--danger)" : "var(--text-dim)" }} />
      {label}
    </button>
  );

  return (
    <Modal title={`${tr(acc.name)} · ${pk.currency}`} onClose={onClose}>
      <div className="space-y-0.5">
        <Row icon={ChevronRight} label={tr("Відкрити рахунок")} onClick={() => setModal({ type: "pocketDetail", payload: pocketId })} />
        <Row icon={Edit3} label={tr("Редагувати рахунок (назва, колір, тип)")} onClick={() => setModal({ type: "account", payload: acc })} />
        <Row icon={Coins} label={tr("Змінити валюту / баланс")} onClick={() => setModal({ type: "pocket", payload: { accountId: acc.id, existing: pk } })} />
        <Row icon={Archive} label={tr("Архівувати картку")} onClick={() => { archivePocket(pocketId); onClose(); }} />
        {!confirmDel ? (
          <Row icon={Trash2} label={tr("Видалити картку")} danger onClick={() => setConfirmDel(true)} />
        ) : (
          <div className="px-1 py-1">
            <p className="text-xs mb-2" style={{ color: "var(--text-dim)" }}>{tr("Картку буде видалено. Операції залишаться в історії.")}</p>
            <div className="flex gap-2">
              <Button variant="danger" className="flex-1" onClick={() => { deletePocket(pocketId); onClose(); }}>{tr("Видалити")}</Button>
              <Button variant="secondary" onClick={() => setConfirmDel(false)}>{tr("Скасувати")}</Button>
            </div>
          </div>
        )}
      </div>
    </Modal>
  );
}

/* ---------- Account Modal (creates account + its first currency pocket) ---------- */
function AccountModal({ onClose, existing, addAccountWithPocket, editAccount, currencies }) {
  const [name, setName] = useState(existing?.name || "");
  const [bank, setBank] = useState(existing?.bank || "");
  const [type, setType] = useState(existing?.type || "cash");
  const [color, setColor] = useState(existing?.color || ACCOUNT_COLORS[0]);
  const [currency, setCurrency] = useState("UAH");
  const [pocketName, setPocketName] = useState("");
  const [balance, setBalance] = useState(0);
  const [error, setError] = useState("");

  const submit = () => {
    if (!name.trim()) return setError(tr("Введіть назву рахунку"));
    if (existing) { editAccount(existing.id, { name: name.trim(), type, color, bank: bank.trim() }); }
    else { addAccountWithPocket({ name: name.trim(), type, color, bank: bank.trim() }, currency, balance, pocketName); }
    onClose();
  };

  return (
    <Modal title={existing ? tr("Редагувати рахунок") : tr("Новий рахунок")} onClose={onClose}>
      <Field label={tr("Назва")} error={error}><Input value={name} onChange={(e) => { setName(e.target.value); setError(""); }} placeholder={tr("Напр. Чорна картка")} /></Field>
      <Field label={tr("Банк (необовʼязково) — для групування")}>
        <Input value={bank} onChange={(e) => setBank(e.target.value)} placeholder={tr("Напр. Монобанк, ПриватБанк")} />
      </Field>
      <Field label={tr("Тип рахунку")}>
        <Select value={type} onChange={(e) => setType(e.target.value)}>{ACCOUNT_TYPES.map((t) => <option key={t.id} value={t.id}>{tr(t.label)}</option>)}</Select>
      </Field>
      <Field label={tr("Колір")}>
        <div className="flex gap-2 flex-wrap">
          {ACCOUNT_COLORS.map((c) => <button key={c} onClick={() => setColor(c)} className="w-8 h-8 rounded-full" style={{ background: c, border: color === c ? "2px solid var(--text)" : "2px solid transparent" }} />)}
        </div>
      </Field>
      {!existing && (
        <>
          <p className="text-xs mb-2 mt-1" style={{ color: "var(--text-dim)" }}>{tr("Створимо перший валютний субрахунок. Інші валюти можна додати пізніше.")}</p>
          <Field label={tr("Назва субрахунку (необовʼязково)")}><Input value={pocketName} onChange={(e) => setPocketName(e.target.value)} placeholder={tr("Напр. Основний")} /></Field>
          <Field label={tr("Валюта")}>
            <Select value={currency} onChange={(e) => setCurrency(e.target.value)}>{(currencies || CURRENCIES).map((c) => <option key={c} value={c}>{c}</option>)}</Select>
          </Field>
          <Field label={tr("Початковий баланс")}><Input type="number" step="0.01" value={balance} onChange={(e) => setBalance(e.target.value)} /></Field>
        </>
      )}
      <Button className="w-full mt-2" onClick={submit}>{existing ? tr("Зберегти зміни") : tr("Створити рахунок")}</Button>
    </Modal>
  );
}

/* ---------- Pocket Modal (add / edit a currency sub-account) ---------- */
function PocketModal({ onClose, accountId, existing, accounts, pockets, addPocket, editPocket, currencies }) {
  const account = accounts.find((a) => a.id === accountId);
  const usedCurrencies = pockets.filter((p) => p.accountId === accountId && p.id !== existing?.id).map((p) => p.currency);
  const pool = currencies || CURRENCIES;
  const availableCurrencies = pool.filter((c) => !usedCurrencies.includes(c) || c === existing?.currency);
  const [currency, setCurrency] = useState(existing?.currency || availableCurrencies[0] || "UAH");
  const [name, setName] = useState(existing?.name || "");
  const [balance, setBalance] = useState(existing ? String(existing.initialBalance) : "0");
  const [error, setError] = useState("");
  const currencyChanged = existing && currency !== existing.currency;

  const submit = () => {
    if (!currency) return setError(tr("Оберіть валюту"));
    if (existing) editPocket(existing.id, { currency, initialBalance: parseFloat(balance) || 0, name: name.trim() });
    else addPocket(accountId, currency, balance, name);
    onClose();
  };

  return (
    <Modal title={existing ? `Субрахунок ${account?.name}` : `Новий валютний субрахунок · ${account?.name}`} onClose={onClose}>
      <Field label={tr("Назва субрахунку (необовʼязково)")}>
        <Input value={name} onChange={(e) => setName(e.target.value)} placeholder={tr("Напр. Заначка, Зарплатна")} />
      </Field>
      <Field label={tr("Валюта")} error={error}>
        <Select value={currency} onChange={(e) => setCurrency(e.target.value)}>
          {availableCurrencies.map((c) => <option key={c} value={c}>{c}</option>)}
        </Select>
      </Field>
      {currencyChanged && <p className="text-xs mb-3" style={{ color: "var(--warn)" }}>{tr("Зміна валюти не конвертує вже наявні операції — вони залишаться у своїх сумах.")}</p>}
      <Field label={existing ? tr("Початковий баланс (без транзакцій)") : tr("Початковий баланс")}>
        <Input type="number" step="0.01" inputMode="decimal" value={balance} onChange={(e) => setBalance(e.target.value)} placeholder="0" />
      </Field>
      {availableCurrencies.length === 0 && !existing && <p className="text-xs mb-3" style={{ color: "var(--danger)" }}>{tr("Усі доступні валюти вже додані до цього рахунку.")}</p>}
      <Button className="w-full mt-2" onClick={submit} disabled={!existing && availableCurrencies.length === 0}>{existing ? tr("Зберегти зміни") : tr("Додати субрахунок")}</Button>
    </Modal>
  );
}

/* ---------- Category Modal ---------- */
function CategoryModal({ onClose, existing, addCategory, editCategory }) {
  const isEdit = existing && existing.id;
  const [name, setName] = useState(existing?.name || "");
  const [type, setType] = useState(existing?.type || "expense");
  const [icon, setIcon] = useState(existing?.icon || "MoreHorizontal");
  const [color, setColor] = useState(existing?.color || ACCOUNT_COLORS[0]);
  const [budget, setBudget] = useState(existing?.budget != null ? String(existing.budget) : "");
  const [error, setError] = useState("");
  const iconOptions = Object.keys(ICONS);

  const submit = () => {
    if (!name.trim()) return setError(tr("Введіть назву категорії"));
    const data = { name: name.trim(), type, icon, color };
    if (type === "expense") { const b = parseFloat(budget); data.budget = b > 0 ? b : null; } else { data.budget = null; }
    if (isEdit) editCategory(existing.id, data); else addCategory(data);
    onClose();
  };

  return (
    <Modal title={isEdit ? tr("Редагувати категорію") : tr("Нова категорія")} onClose={onClose}>
      <Field label={tr("Назва")} error={error}><Input value={name} onChange={(e) => { setName(e.target.value); setError(""); }} /></Field>
      <Field label={tr("Тип")}>
        <Select value={type} onChange={(e) => setType(e.target.value)} disabled={isEdit}>
          <option value="expense">{tr("Витрата")}</option>
          <option value="income">{tr("Дохід")}</option>
        </Select>
      </Field>
      <Field label={tr("Іконка")}>
        <div className="grid grid-cols-8 gap-2 max-h-32 overflow-y-auto">
          {iconOptions.map((k) => (
            <button key={k} onClick={() => setIcon(k)} className="w-9 h-9 rounded-lg flex items-center justify-center" style={{ background: icon === k ? "var(--accent)" : "var(--surface2)" }}>
              <Icon name={k} size={15} style={{ color: icon === k ? "#08110D" : "var(--text-dim)" }} />
            </button>
          ))}
        </div>
      </Field>
      <Field label={tr("Колір")}>
        <div className="flex gap-2 flex-wrap">{ACCOUNT_COLORS.map((c) => <button key={c} onClick={() => setColor(c)} className="w-8 h-8 rounded-full" style={{ background: c, border: color === c ? "2px solid var(--text)" : "2px solid transparent" }} />)}</div>
      </Field>
      {type === "expense" && (
        <Field label={tr("Місячний ліміт (бюджет), необовʼязково")}>
          <Input type="number" inputMode="decimal" step="1" value={budget} onChange={(e) => setBudget(e.target.value)} placeholder={tr("напр. 8000")} />
        </Field>
      )}
      <Button className="w-full mt-2" onClick={submit}>{isEdit ? tr("Зберегти зміни") : tr("Створити категорію")}</Button>
    </Modal>
  );
}

/* ---------- Transaction (income/expense) Modal ---------- */
function TransactionModal({ onClose, kind, editing, presetPocketId, accounts, pockets, categories, addTransaction, editTransaction }) {
  const isIncome = kind === "income";
  const cats = categories.filter((c) => c.type === kind && !c.archived);
  const firstPocket = pockets.find((p) => !p.archived);
  const [amount, setAmount] = useState(editing?.amount || "");
  const [pocketId, setPocketId] = useState(editing?.pocketId || presetPocketId || firstPocket?.id || "");
  const [categoryId, setCategoryId] = useState(editing?.categoryId || cats[0]?.id || "");
  const [date, setDate] = useState(editing?.date || new Date().toISOString().slice(0, 10));
  const [note, setNote] = useState(editing?.note || "");
  const [receipt, setReceipt] = useState(editing?.receipt || null);
  const [error, setError] = useState("");

  const currentPocket = pockets.find((p) => p.id === pocketId);
  const currency = currentPocket?.currency || "UAH";

  const handleReceipt = (e) => {
    const file = e.target.files?.[0];
    if (!file) return;
    const reader = new FileReader();
    reader.onload = () => setReceipt(reader.result);
    reader.readAsDataURL(file);
  };

  const submit = () => {
    const amt = parseFloat(amount);
    if (!amt || amt <= 0) return setError(tr("Введіть коректну суму"));
    if (!pocketId) return setError(tr("Оберіть рахунок"));
    if (!categoryId) return setError(tr("Оберіть категорію"));
    const data = { type: kind, amount: amt, currency, pocketId, categoryId, date, note, receipt };
    if (editing) editTransaction(editing.id, data); else addTransaction(data);
    onClose();
  };

  return (
    <Modal title={editing ? tr("Редагувати операцію") : isIncome ? tr("Додати дохід") : tr("Додати витрату")} onClose={onClose}>
      <Field label={tr("Рахунок")}>
        <PocketSelect accounts={accounts} pockets={pockets} value={pocketId} onChange={setPocketId} />
      </Field>
      <Field label={`Сума (${currency})`} error={error}>
        <Input type="number" step="0.01" value={amount} onChange={(e) => { setAmount(e.target.value); setError(""); }} placeholder="0.00" />
      </Field>
      <Field label={tr("Категорія")}>
        <div className="grid grid-cols-4 gap-2">
          {cats.map((c) => (
            <button key={c.id} onClick={() => setCategoryId(c.id)} className="flex flex-col items-center gap-1 p-2 rounded-xl" style={{ background: categoryId === c.id ? "var(--surface2)" : "transparent", border: categoryId === c.id ? `1px solid ${c.color}` : "1px solid var(--border)" }}>
              <Icon name={c.icon} size={16} style={{ color: c.color }} />
              <span className="text-[10px] text-center leading-tight" style={{ color: "var(--text)" }}>{tr(c.name)}</span>
            </button>
          ))}
        </div>
      </Field>
      <Field label={tr("Дата")}><Input type="date" value={date} onChange={(e) => setDate(e.target.value)} /></Field>
      <Field label={tr("Опис / коментар")}><Textarea rows={2} value={note} onChange={(e) => setNote(e.target.value)} placeholder={tr("Необов'язково")} /></Field>
      <Field label={tr("Фото чеку (необов'язково)")}>
        <input type="file" accept="image/*" onChange={handleReceipt} className="text-xs" style={{ color: "var(--text-dim)" }} />
        {receipt && <img src={receipt} alt={tr("чек")} className="mt-2 h-24 rounded-lg object-cover" />}
      </Field>
      <Button className="w-full mt-2" onClick={submit}>{editing ? tr("Зберегти зміни") : tr("Зберегти")}</Button>
    </Modal>
  );
}

/* ---------- Transfer / Exchange Modal ---------- */
function TransferExchangeModal({ onClose, mode, presetFromPocketId, accounts, pockets, rates, addTransaction }) {
  const isExchange = mode === "exchange";
  const active = pockets.filter((p) => !p.archived);
  const [fromPocketId, setFromPocketId] = useState(presetFromPocketId || active[0]?.id || "");
  const [toPocketId, setToPocketId] = useState(active.find((p) => p.id !== (presetFromPocketId || active[0]?.id))?.id || active[0]?.id || "");
  const [fromAmount, setFromAmount] = useState("");
  const [rate, setRate] = useState(1);
  const [toAmount, setToAmount] = useState("");
  const [fee, setFee] = useState(0);
  const [date, setDate] = useState(new Date().toISOString().slice(0, 10));
  const [note, setNote] = useState("");
  const [error, setError] = useState("");
  const [manualTo, setManualTo] = useState(false);

  const fromPocket = pockets.find((p) => p.id === fromPocketId);
  const toPocket = pockets.find((p) => p.id === toPocketId);
  const fromCurrency = fromPocket?.currency || "UAH";
  const toCurrency = toPocket?.currency || "UAH";
  const crossCurrency = fromCurrency !== toCurrency;

  useEffect(() => {
    if (crossCurrency) setRate(Math.round(convert(1, fromCurrency, toCurrency, rates) * 10000) / 10000);
    else setRate(1);
  }, [fromCurrency, toCurrency, crossCurrency]);

  useEffect(() => {
    if (manualTo) return;
    const amt = parseFloat(fromAmount) || 0;
    const f = parseFloat(fee) || 0;
    const computed = crossCurrency ? amt * rate - f : amt - f;
    setToAmount(computed > 0 ? Math.round(computed * 100) / 100 : 0);
  }, [fromAmount, rate, fee, crossCurrency, manualTo]);

  const submit = () => {
    const amt = parseFloat(fromAmount);
    if (!amt || amt <= 0) return setError(tr("Введіть коректну суму списання"));
    if (!fromPocketId || !toPocketId) return setError(tr("Оберіть рахунки"));
    if (fromPocketId === toPocketId) return setError(tr("Оберіть різні рахунки"));
    const to = parseFloat(toAmount);
    if (!to || to <= 0) return setError(tr("Сума зарахування має бути додатною"));
    addTransaction({ type: isExchange ? "exchange" : "transfer", date, fromPocketId, toPocketId, fromAmount: amt, fromCurrency, toAmount: to, toCurrency, rate: crossCurrency ? rate : 1, fee: parseFloat(fee) || 0, note });
    onClose();
  };

  return (
    <Modal title={isExchange ? tr("Обмін валюти") : tr("Переказ між рахунками")} onClose={onClose}>
      <Field label={tr("Рахунок списання")}>
        <PocketSelect accounts={accounts} pockets={pockets} value={fromPocketId} onChange={setFromPocketId} />
      </Field>
      <Field label={tr("Рахунок зарахування")}>
        <PocketSelect accounts={accounts} pockets={pockets} value={toPocketId} onChange={setToPocketId} excludePocketId={fromPocketId} />
      </Field>
      <Field label={`Сума списання (${fromCurrency})`} error={error}>
        <Input type="number" step="0.01" value={fromAmount} onChange={(e) => { setFromAmount(e.target.value); setError(""); }} />
      </Field>
      {crossCurrency && (
        <Field label={`Курс обміну (1 ${fromCurrency} = X ${toCurrency})`}><Input type="number" step="0.0001" value={rate} onChange={(e) => setRate(parseFloat(e.target.value) || 0)} /></Field>
      )}
      <Field label={`Комісія (${crossCurrency ? toCurrency : fromCurrency}, необов'язково)`}><Input type="number" step="0.01" value={fee} onChange={(e) => setFee(e.target.value)} /></Field>
      <Field label={`Сума зарахування (${toCurrency})`}><Input type="number" step="0.01" value={toAmount} onChange={(e) => { setToAmount(e.target.value); setManualTo(true); }} /></Field>
      <Field label={tr("Дата")}><Input type="date" value={date} onChange={(e) => setDate(e.target.value)} /></Field>
      <Field label={tr("Коментар")}><Textarea rows={2} value={note} onChange={(e) => setNote(e.target.value)} placeholder={tr("Необов'язково")} /></Field>
      <Button className="w-full mt-2" onClick={submit}>{isExchange ? tr("Обміняти") : tr("Переказати")}</Button>
    </Modal>
  );
}

/* ---------- Loan Modal ---------- */
function LoanModal({ onClose, accounts, pockets, addLoan, direction }) {
  const isIn = direction === "in";
  const active = pockets.filter((p) => !p.archived);
  const [borrower, setBorrower] = useState("");
  const [amount, setAmount] = useState("");
  const [pocketId, setPocketId] = useState(active[0]?.id || "");
  const [dateGiven, setDateGiven] = useState(new Date().toISOString().slice(0, 10));
  const [dueDate, setDueDate] = useState("");
  const [note, setNote] = useState("");
  const [error, setError] = useState("");

  const currency = pockets.find((p) => p.id === pocketId)?.currency || "UAH";

  const submit = () => {
    const amt = parseFloat(amount);
    if (!borrower.trim()) return setError(isIn ? tr("Вкажіть, кому ви винні") : tr("Введіть ім'я позичальника"));
    if (!amt || amt <= 0) return setError(tr("Введіть коректну суму"));
    if (!pocketId) return setError(tr("Оберіть рахунок"));
    if (!dueDate) return setError(isIn ? tr("Вкажіть термін сплати") : tr("Вкажіть очікувану дату повернення"));
    addLoan({ borrower: borrower.trim(), amount: amt, currency, pocketId, dateGiven, dueDate, note, direction: isIn ? "in" : "out" }, pocketId, amt, currency, note);
    onClose();
  };

  return (
    <Modal title={isIn ? tr("Додати борг (я винен)") : tr("Надати позику")} onClose={onClose}>
      <Field label={isIn ? tr("Кому ви винні") : tr("Ім'я / назва позичальника")} error={error}><Input value={borrower} onChange={(e) => { setBorrower(e.target.value); setError(""); }} placeholder={isIn ? tr("Напр. Банк / Андрій") : tr("Напр. Олег К.")} /></Field>
      <Field label={isIn ? tr("Рахунок, куди надійшли кошти") : tr("Рахунок, з якого видано кошти")}>
        <PocketSelect accounts={accounts} pockets={pockets} value={pocketId} onChange={setPocketId} />
      </Field>
      <Field label={`Сума (${currency})`}><Input type="number" step="0.01" value={amount} onChange={(e) => setAmount(e.target.value)} /></Field>
      <Field label={isIn ? tr("Дата отримання") : tr("Дата надання")}><Input type="date" value={dateGiven} onChange={(e) => setDateGiven(e.target.value)} /></Field>
      <Field label={isIn ? tr("Термін сплати") : tr("Очікувана дата повернення")}><Input type="date" value={dueDate} onChange={(e) => setDueDate(e.target.value)} /></Field>
      <Field label={tr("Коментар / домовленість")}><Textarea rows={2} value={note} onChange={(e) => setNote(e.target.value)} placeholder={tr("Необов'язково")} /></Field>
      <Button className="w-full mt-2" onClick={submit}>{isIn ? tr("Додати борг") : tr("Надати позику")}</Button>
    </Modal>
  );
}

/* ---------- Loan Edit Modal ---------- */
function LoanEditModal({ onClose, loan, editLoan }) {
  const [borrower, setBorrower] = useState(loan.borrower);
  const [dueDate, setDueDate] = useState(loan.dueDate);
  const [note, setNote] = useState(loan.note || "");
  const [error, setError] = useState("");
  const submit = () => {
    if (!borrower.trim()) return setError(tr("Введіть імʼя позичальника"));
    if (!dueDate) return setError(tr("Оберіть дату повернення"));
    editLoan(loan.id, { borrower: borrower.trim(), dueDate, note: note.trim() });
    onClose();
  };
  return (
    <Modal title={tr("Редагувати позику")} onClose={onClose}>
      <p className="text-xs mb-3" style={{ color: "var(--text-dim)" }}>{tr("Суму, валюту й рахунок змінити не можна (вони пов'язані з операцією видачі). Можна відкоригувати позичальника, дату й коментар.")}</p>
      <Field label={tr("Кому позичено")} error={error}><Input value={borrower} onChange={(e) => { setBorrower(e.target.value); setError(""); }} /></Field>
      <Field label={tr("Дата повернення")}><Input type="date" value={dueDate} onChange={(e) => setDueDate(e.target.value)} /></Field>
      <Field label={tr("Коментар / домовленість")}><Textarea rows={2} value={note} onChange={(e) => setNote(e.target.value)} placeholder={tr("Необов'язково")} /></Field>
      <Button className="w-full mt-2" onClick={submit}>{tr("Зберегти")}</Button>
    </Modal>
  );
}

/* ---------- Loan Return Modal ---------- */
function LoanReturnModal({ onClose, loan, accounts, pockets, registerLoanReturn, loanRemaining }) {
  const active = pockets.filter((p) => !p.archived && p.currency === loan.currency);
  const remaining = loanRemaining(loan);
  const [amount, setAmount] = useState(remaining);
  const [pocketId, setPocketId] = useState(active.find((p) => p.id === loan.pocketId)?.id || active[0]?.id || "");
  const [date, setDate] = useState(new Date().toISOString().slice(0, 10));
  const [note, setNote] = useState("");
  const [error, setError] = useState("");

  const submit = () => {
    const amt = parseFloat(amount);
    if (!amt || amt <= 0) return setError(tr("Введіть коректну суму повернення"));
    if (amt > remaining + 0.005) return setError(tr(`Сума не може перевищувати залишок боргу (${fmtMoney(remaining, loan.currency)})`));
    if (!pocketId) return setError(tr("Оберіть рахунок зарахування"));
    registerLoanReturn(loan.id, amt, pocketId, loan.currency, date, note);
    onClose();
  };

  return (
    <Modal title={(loan.direction === "in" ? tr("Погашення боргу: ") : tr("Повернення позики: ")) + loan.borrower} onClose={onClose}>
      <p className="text-sm mb-4 px-3 py-2 rounded-lg" style={{ background: "var(--surface2)", color: "var(--text-dim)" }}>
        {loan.direction === "in" ? tr("Залишок до сплати: ") : tr("Залишок боргу: ")}<strong style={{ color: "var(--text)" }}>{fmtMoney(remaining, loan.currency)}</strong>
      </p>
      <Field label={(loan.direction === "in" ? tr("Сума погашення") : tr("Сума повернення")) + ` (${loan.currency})`} error={error}>
        <Input type="number" step="0.01" max={remaining} value={amount} onChange={(e) => { setAmount(e.target.value); setError(""); }} />
      </Field>
      <Field label={(loan.direction === "in" ? tr("Рахунок, з якого сплачуєте") : tr("Рахунок зарахування")) + tr(` (валюта ${loan.currency})`)}>
        <PocketSelect accounts={accounts} pockets={active} value={pocketId} onChange={setPocketId} />
      </Field>
      <Field label={tr("Дата")}><Input type="date" value={date} onChange={(e) => setDate(e.target.value)} /></Field>
      <Field label={tr("Коментар")}><Textarea rows={2} value={note} onChange={(e) => setNote(e.target.value)} placeholder={tr("Необов'язково")} /></Field>
      <Button className="w-full mt-2" onClick={submit}>{loan.direction === "in" ? tr("Зареєструвати погашення") : tr("Зареєструвати повернення")}</Button>
    </Modal>
  );
}
