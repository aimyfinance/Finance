  const [crossTo, setCrossTo] = useState("EUR");
  const activeCurs = ["UAH"].concat(Object.keys(localRates).filter((c) => c !== "UAH"));
  const addableCurs = ALL_CURRENCIES.filter((c) => !(c in localRates));
  const rateToUAH = (c) => (c === "UAH" ? 1 : (parseFloat(localRates[c]) || 0));
  const crossRate = (() => {
    const a = rateToUAH(crossFrom), b = rateToUAH(crossTo);
    return b > 0 ? a / b : 0;
  })();
  const addCurrency = () => { if (addCur && !(addCur in localRates)) { setLocalRates({ ...localRates, [addCur]: "" }); setAddCur(""); } };
  const removeCurrency = (c) => { const r = { ...localRates }; delete r[c]; setLocalRates(r); if (base === c) setBase("UAH"); if (crossFrom === c) setCrossFrom("UAH"); if (crossTo === c) setCrossTo("UAH"); };
  const save = () => {
    const parsed = { UAH: 1 };
    Object.keys(localRates).forEach((k) => { if (k !== "UAH") parsed[k] = parseFloat(localRates[k]) || 0; });
    const finalBase = base === "UAH" || parsed[base] !== undefined ? base : "UAH";
    update({ rates: parsed, baseCurrency: finalBase });
    setToast && setToast("Налаштування збережено");
  };

  const [pinMode, setPinMode] = useState(false);
  const [pin1, setPin1] = useState("");
  const [pin2, setPin2] = useState("");
  const [pinErr, setPinErr] = useState("");
  const savePinCode = () => {
    if (!/^\d{4,6}$/.test(pin1)) return setPinErr("PIN має містити 4–6 цифр");
    if (pin1 !== pin2) return setPinErr("Коди не збігаються");
    applyPin(pin1);
    setPinMode(false); setPin1(""); setPin2(""); setPinErr("");
    setToast && setToast("PIN-код увімкнено");
  };
  const removePin = () => { applyPin(null); setToast && setToast("PIN-код вимкнено"); };

  const [feedback, setFeedback] = useState("");
  const sendFeedback = () => {
    const subject = encodeURIComponent("K\u00b3 Finance — відгук / побажання");
    const body = encodeURIComponent(feedback.trim());
    window.location.href = "mailto:" + FEEDBACK_EMAIL + "?subject=" + subject + "&body=" + body;
    setFeedback("");
    setToast && setToast("Відкрито поштовий застосунок");
  };
  const [showTerms, setShowTerms] = useState(false);

  const [email, setEmail] = useState("");
  const [password, setPassword] = useState("");
  const [authBusy, setAuthBusy] = useState(false);
  const [authErr, setAuthErr] = useState("");

  const signIn = async () => {
    setAuthErr(""); setAuthBusy(true);
    const { error } = await SB.auth.signInWithPassword({ email: email.trim(), password });
    setAuthBusy(false);
    if (error) setAuthErr(error.message); else { setPassword(""); }
  };
  const signUp = async () => {
    setAuthErr(""); setAuthBusy(true);
    const { error } = await SB.auth.signUp({ email: email.trim(), password });
    setAuthBusy(false);
    if (error) setAuthErr(error.message); else { setPassword(""); setToast("Акаунт створено"); }
  };
  const signOut = async () => { await SB.auth.signOut(); setToast("Ви вийшли з акаунта"); };

  return (
    <div className="space-y-5 animate-in max-w-xl">
      <h1 className="font-display font-bold text-2xl">Налаштування</h1>

      <Card className="p-5 flex items-center justify-between" style={{ background: "linear-gradient(135deg, #1A2338 0%, #10192B 100%)", border: "1px solid var(--border)" }}>
        <span className="font-display font-bold tracking-tight" style={{ fontSize: 26, color: "#F3F0E8" }}>
          K<sup style={{ color: "#C9A362", fontSize: "0.6em", fontWeight: 700, position: "relative", top: "-0.5em" }}>3</sup>
          <span style={{ fontWeight: 600, marginLeft: 8 }}>Finance</span>
        </span>
        <span className="font-display uppercase text-right" style={{ fontSize: 10, letterSpacing: "0.24em", color: "#C9A362" }}>Premium<br />Wealth</span>
      </Card>

      <Card className="p-5">
        <h3 className="font-display font-semibold text-sm mb-1">Категорії</h3>
        <p className="text-xs mb-3" style={{ color: "var(--text-dim)" }}>Додавайте власні категорії витрат і доходів, редагуйте назви, іконки та кольори або ховайте зайві.</p>
        <Button variant="secondary" onClick={() => setView && setView("categories")}><Tags size={15} /> Керувати категоріями</Button>
      </Card>

      <Card className="p-5">
        <h3 className="font-display font-semibold text-sm mb-1">Синхронізація між пристроями</h3>
        {!SB ? (
          <p className="text-xs" style={{ color: "var(--text-dim)" }}>Хмарну синхронізацію не налаштовано. Додайте ключі Supabase у код застосунку, щоб увімкнути вхід і збереження в хмару.</p>
        ) : session ? (
          <div>
            <p className="text-sm mb-3" style={{ color: "var(--text-dim)" }}>Ви увійшли як <strong style={{ color: "var(--text)" }}>{session.user.email}</strong>. Дані зберігаються в хмару автоматично.</p>
            <Button variant="secondary" onClick={signOut}>Вийти з акаунта</Button>
          </div>
        ) : (
          <div>
            <p className="text-xs mb-3" style={{ color: "var(--text-dim)" }}>Увійдіть, щоб синхронізувати дані між своїми пристроями. На новому пристрої увійдіть тим самим акаунтом — дані підтягнуться.</p>
            <Field label="Email"><Input type="email" value={email} onChange={(e) => { setEmail(e.target.value); setAuthErr(""); }} placeholder="you@example.com" /></Field>
            <Field label="Пароль" error={authErr}><Input type="password" value={password} onChange={(e) => { setPassword(e.target.value); setAuthErr(""); }} placeholder="мінімум 6 символів" /></Field>
            <div className="flex gap-2">
              <Button onClick={signIn} disabled={authBusy} className="flex-1">Увійти</Button>
              <Button variant="secondary" onClick={signUp} disabled={authBusy} className="flex-1">Створити акаунт</Button>
            </div>
          </div>
        )}
      </Card>

      <Card className="p-5">
        <h3 className="font-display font-semibold text-sm mb-1">PIN-код</h3>
        {pin && !pinMode ? (
          <div>
            <p className="text-xs mb-3" style={{ color: "var(--text-dim)" }}>Увімкнено. Застосунок запитуватиме код при кожному відкритті.</p>
            <div className="flex gap-2">
              <Button variant="secondary" onClick={() => { setPinMode(true); setPin1(""); setPin2(""); setPinErr(""); }}>Змінити</Button>
              <Button variant="secondary" onClick={removePin}>Вимкнути</Button>
            </div>
          </div>
        ) : pinMode ? (
          <div>
            <p className="text-xs mb-3" style={{ color: "var(--text-dim)" }}>Придумайте код із 4–6 цифр.</p>
            <Field label="Новий PIN"><Input type="password" inputMode="numeric" maxLength={6} value={pin1} onChange={(e) => { setPin1(e.target.value.replace(/\D/g, "")); setPinErr(""); }} placeholder="••••" /></Field>
            <Field label="Повторіть PIN" error={pinErr}><Input type="password" inputMode="numeric" maxLength={6} value={pin2} onChange={(e) => { setPin2(e.target.value.replace(/\D/g, "")); setPinErr(""); }} placeholder="••••" /></Field>
            <div className="flex gap-2">
              <Button onClick={savePinCode} className="flex-1">Зберегти</Button>
              <Button variant="secondary" onClick={() => { setPinMode(false); setPinErr(""); }}>Скасувати</Button>
            </div>
          </div>
        ) : (
          <div>
            <p className="text-xs mb-3" style={{ color: "var(--text-dim)" }}>Захистіть застосунок кодом на вході. Код зберігається лише на цьому пристрої.</p>
            <Button onClick={() => { setPinMode(true); setPin1(""); setPin2(""); setPinErr(""); }}>Встановити PIN</Button>
          </div>
        )}
      </Card>

      <Card className="p-5">
        <h3 className="font-display font-semibold text-sm mb-1">Резервна копія</h3>
        <p className="text-xs mb-3" style={{ color: "var(--text-dim)" }}>Збережіть файл-копію на iPhone або відновіть дані з файлу. Хмарна копія — у блоці «Синхронізація» вище.</p>
        <div className="flex gap-2 flex-wrap">
          <Button variant="secondary" onClick={exportBackup}><ArrowDownRight size={15} /> Зберегти копію</Button>
          <label className="inline-flex items-center gap-2 px-4 py-2 rounded-lg text-sm font-medium cursor-pointer" style={{ background: "var(--surface2)", color: "var(--text)", border: "1px solid var(--border)" }}>
            <ArrowUpRight size={15} /> Відновити з файлу
            <input type="file" accept="application/json,.json" className="hidden" onChange={(e) => { const f = e.target.files && e.target.files[0]; if (f) importBackup(f); e.target.value = ""; }} />
          </label>
        </div>
        <p className="text-[11px] mt-2" style={{ color: "var(--text-dim)" }}>Відновлення замінить поточні дані на цьому пристрої.</p>
      </Card>

      <Card className="p-5">
        <Field label="Базова валюта (для загального балансу)">
          <Select value={base} onChange={(e) => setBase(e.target.value)}>{activeCurs.map((c) => <option key={c} value={c}>{c}</option>)}</Select>
        </Field>

        <p className="text-xs mb-2" style={{ color: "var(--text-dim)" }}>Курси валют — скільки <b style={{ color: "var(--text)" }}>UAH</b> коштує 1 одиниця валюти. Крос-курси між валютами рахуються автоматично.</p>
        <div className="grid grid-cols-2 gap-3">
          {activeCurs.filter((c) => c !== "UAH").map((c) => (
            <div key={c}>
              <div className="flex items-center justify-between mb-1">
                <span className="text-xs font-medium" style={{ color: "var(--text-dim)" }}>1 {c} =</span>
                <button onClick={() => removeCurrency(c)} className="text-[11px] font-medium" style={{ color: "var(--danger)" }}>Прибрати</button>
              </div>
              <Input type="number" step="0.0001" inputMode="decimal" value={localRates[c] ?? ""} onChange={(e) => setLocalRates({ ...localRates, [c]: e.target.value })} placeholder="0" />
            </div>
          ))}
        </div>
        {addableCurs.length > 0 && (
          <div className="flex gap-2 items-end mt-3">
            <div className="flex-1 min-w-0">
              <span className="text-[11px] font-medium mb-1 block" style={{ color: "var(--text-dim)" }}>Додати валюту</span>
              <Select value={addCur} onChange={(e) => setAddCur(e.target.value)}>
                <option value="">— оберіть валюту —</option>
                {addableCurs.map((c) => <option key={c} value={c}>{c}</option>)}
              </Select>
            </div>
            <Button variant="secondary" onClick={addCurrency} disabled={!addCur}><Plus size={15} /> Додати</Button>
          </div>
        )}

        <div className="mt-4 pt-4" style={{ borderTop: "1px solid var(--border)" }}>
          <p className="text-xs font-semibold mb-2" style={{ color: "var(--text)" }}>Крос-курс валют</p>
          <div className="flex items-center gap-2">
            <Select value={crossFrom} onChange={(e) => setCrossFrom(e.target.value)} className="flex-1">{activeCurs.map((c) => <option key={c} value={c}>{c}</option>)}</Select>
            <ArrowUpRight size={16} style={{ color: "var(--text-dim)", transform: "rotate(45deg)" }} />
            <Select value={crossTo} onChange={(e) => setCrossTo(e.target.value)} className="flex-1">{activeCurs.map((c) => <option key={c} value={c}>{c}</option>)}</Select>
          </div>
          <p className="text-sm mt-2 font-semibold tabular" style={{ color: "var(--accent)" }}>
            {crossRate > 0 ? `1 ${crossFrom} = ${crossRate.toLocaleString("uk-UA", { maximumFractionDigits: 4 })} ${crossTo}` : "Вкажіть курси обох валют, щоб побачити крос-курс"}
          </p>
        </div>

        <Button onClick={save} className="mt-4">Зберегти налаштування</Button>
      </Card>

      <Card className="p-5">
        <h3 className="font-display font-semibold text-sm mb-1">Зворотний зв'язок</h3>
        <p className="text-xs mb-3" style={{ color: "var(--text-dim)" }}>Поділіться побажанням, ідеєю чи повідомте про проблему — ми будемо вдячні за ваш відгук.</p>
        <Textarea rows={3} value={feedback} onChange={(e) => setFeedback(e.target.value)} placeholder="Ваш відгук або побажання…" />
        <Button className="mt-2" onClick={sendFeedback} disabled={!feedback.trim()}><ArrowUpRight size={15} /> Надіслати відгук</Button>
      </Card>

      <Card className="p-5">
        <button onClick={() => setShowTerms(!showTerms)} className="w-full flex items-center justify-between text-left">
          <span className="font-display font-semibold text-sm">Угода користувача та конфіденційність</span>
          {showTerms ? <ChevronDown size={18} style={{ color: "var(--text-dim)" }} /> : <ChevronRight size={18} style={{ color: "var(--text-dim)" }} />}
        </button>
        {showTerms && (
          <div className="mt-3">
            <AgreementText />
          </div>
        )}
      </Card>
    </div>
  );
}

/* ============================== MODAL ROUTER ============================== */

function ModalRouter({ modal, setModal, accounts, pockets, categories, rates, baseCurrency, currencies, addAccountWithPocket, editAccount, addPocket, editPocket, archivePocket, deleteAccount, deletePocket, movePocket, addCategory, editCategory, addTransaction, editTransaction, addLoan, registerLoanReturn, editLoan, loans, loanRemaining, getPocket, pocketBalance, pocketLabel, transactions, deleteTransaction, duplicateTransaction, reminders, addReminder, editReminder, deleteReminder, toggleReminderDone }) {
  const close = () => setModal(null);
  if (modal.type === "account") return <AccountModal onClose={close} existing={modal.payload} addAccountWithPocket={addAccountWithPocket} editAccount={editAccount} currencies={currencies} />;
  if (modal.type === "pocket") return <PocketModal onClose={close} accountId={modal.payload.accountId} existing={modal.payload.existing} accounts={accounts} pockets={pockets} addPocket={addPocket} editPocket={editPocket} currencies={currencies} />;
  if (modal.type === "cardMenu") return <CardMenuModal onClose={close} pocketId={modal.payload} pockets={pockets} getPocket={getPocket} setModal={setModal} archivePocket={archivePocket} deletePocket={deletePocket} movePocket={movePocket} />;
  if (modal.type === "category") return <CategoryModal onClose={close} existing={modal.payload} addCategory={addCategory} editCategory={editCategory} />;
  if (modal.type === "transaction") return <TransactionModal onClose={close} kind={modal.payload.kind} editing={modal.payload.editing} presetPocketId={modal.payload.presetPocketId} accounts={accounts} pockets={pockets} categories={categories} addTransaction={addTransaction} editTransaction={editTransaction} />;
  if (modal.type === "transfer") return <TransferExchangeModal onClose={close} mode="transfer" presetFromPocketId={modal.payload?.presetPocketId} accounts={accounts} pockets={pockets} rates={rates} addTransaction={addTransaction} />;
  if (modal.type === "exchange") return <TransferExchangeModal onClose={close} mode="exchange" presetFromPocketId={modal.payload?.presetPocketId} accounts={accounts} pockets={pockets} rates={rates} addTransaction={addTransaction} />;
  if (modal.type === "loan") return <LoanModal onClose={close} accounts={accounts} pockets={pockets} addLoan={addLoan} />;
  if (modal.type === "loanReturn") return <LoanReturnModal onClose={close} loan={modal.payload} accounts={accounts} pockets={pockets} registerLoanReturn={registerLoanReturn} loanRemaining={loanRemaining} />;
  if (modal.type === "loanEdit") return <LoanEditModal onClose={close} loan={modal.payload} editLoan={editLoan} />;
  if (modal.type === "pocketDetail") return <PocketDetailModal pocketId={modal.payload} onClose={close} getPocket={getPocket} pocketBalance={pocketBalance} pocketLabel={pocketLabel} transactions={transactions} categories={categories} setModal={setModal} editTransaction={editTransaction} deleteTransaction={deleteTransaction} duplicateTransaction={duplicateTransaction} archivePocket={archivePocket} />;
  if (modal.type === "reminders") return <RemindersModal onClose={close} reminders={reminders} addReminder={addReminder} editReminder={editReminder} deleteReminder={deleteReminder} toggleReminderDone={toggleReminderDone} currencies={currencies} />;
  return null;
}

/* ---------- Reminders (bell) ---------- */
function RemindersModal({ onClose, reminders, addReminder, editReminder, deleteReminder, toggleReminderDone, currencies }) {
  const [editing, setEditing] = useState(null); // null | "new" | reminder object
  const [title, setTitle] = useState("");
  const [date, setDate] = useState(new Date().toISOString().slice(0, 10));
  const [amount, setAmount] = useState("");
  const [currency, setCurrency] = useState("UAH");
  const [note, setNote] = useState("");
  const [error, setError] = useState("");

  const openNew = () => { setEditing("new"); setTitle(""); setDate(new Date().toISOString().slice(0, 10)); setAmount(""); setCurrency("UAH"); setNote(""); setError(""); };
  const openEdit = (r) => { setEditing(r); setTitle(r.title); setDate(r.date); setAmount(r.amount != null ? String(r.amount) : ""); setCurrency(r.currency || "UAH"); setNote(r.note || ""); setError(""); };
  const cancel = () => setEditing(null);

  const submit = () => {
    if (!title.trim()) return setError("Введіть назву нагадування");
    if (!date) return setError("Оберіть дату");
    const data = { title: title.trim(), date, amount: amount === "" ? null : parseFloat(amount) || 0, currency, note: note.trim() };
    if (editing === "new") addReminder(data); else editReminder(editing.id, data);
    setEditing(null);
  };

  const today = new Date(new Date().setHours(0, 0, 0, 0));
  const sorted = [...reminders].sort((a, b) => {
    if (a.done !== b.done) return a.done ? 1 : -1;
    return new Date(a.date) - new Date(b.date);
  });

  return (
    <div className="fixed inset-0 z-50 overflow-y-auto animate-in" style={{ background: "var(--bg)" }}>
      <div className="sticky top-0 z-10 flex items-center justify-between px-5 border-b" style={{ background: "var(--bg)", borderColor: "var(--border)", paddingTop: "calc(1rem + env(safe-area-inset-top))", paddingBottom: "1rem" }}>
        <h1 className="font-display font-bold text-xl flex items-center gap-2"><Bell size={20} /> Нагадування</h1>
        <button onClick={onClose} className="p-2 rounded-lg" style={{ color: "var(--text-dim)" }}><X size={20} /></button>
      </div>

      <div className="px-5 py-5 max-w-xl mx-auto space-y-4">
        {editing ? (
          <Card className="p-5">
            <h3 className="font-display font-semibold text-sm mb-3">{editing === "new" ? "Нове нагадування" : "Редагувати нагадування"}</h3>
            <Field label="Що зробити" error={error}><Input value={title} onChange={(e) => { setTitle(e.target.value); setError(""); }} placeholder="Напр. Оплатити прибиральницю" /></Field>
            <Field label="Дата"><Input type="date" value={date} onChange={(e) => setDate(e.target.value)} /></Field>
            <Field label="Сума (необов'язково)">
              <div className="flex gap-2">
                <div className="flex-1 min-w-0"><Input type="number" step="0.01" inputMode="decimal" value={amount} onChange={(e) => setAmount(e.target.value)} placeholder="0" /></div>
                <div className="w-20 shrink-0"><Select value={currency} onChange={(e) => setCurrency(e.target.value)}>{(currencies || CURRENCIES).map((c) => <option key={c} value={c}>{c}</option>)}</Select></div>
              </div>
            </Field>
            <Field label="Коментар"><Textarea rows={2} value={note} onChange={(e) => setNote(e.target.value)} placeholder="Необов'язково" /></Field>
            <div className="flex gap-2 mt-1">
              <Button onClick={submit} className="flex-1">{editing === "new" ? "Створити" : "Зберегти"}</Button>
              <Button variant="secondary" onClick={cancel}>Скасувати</Button>
            </div>
          </Card>
        ) : (
          <Button onClick={openNew} className="w-full"><Plus size={16} /> Нове нагадування</Button>
        )}

        <div className="space-y-2">
          {sorted.map((r) => {
            const days = daysBetween(new Date(), r.date);
            const overdue = !r.done && new Date(r.date) < today;
            return (
              <Card key={r.id} className={`p-4 ${r.done ? "opacity-50" : ""}`} style={overdue ? { borderColor: "var(--danger)" } : {}}>
                <div className="flex items-start gap-3">
                  <button onClick={() => toggleReminderDone(r.id)} className="mt-0.5 w-5 h-5 rounded-full border flex items-center justify-center shrink-0" style={{ borderColor: r.done ? "var(--accent)" : "var(--border)", background: r.done ? "var(--accent)" : "transparent" }}>
                    {r.done && <Check size={12} color="#08110D" />}
                  </button>
                  <div className="flex-1 min-w-0">
                    <p className={`text-sm font-medium ${r.done ? "line-through" : ""}`} style={{ color: "var(--text)" }}>{r.title}</p>
                    <p className="text-xs mt-0.5" style={{ color: overdue ? "var(--danger)" : "var(--text-dim)" }}>
                      {fmtDate(r.date)}
                      {r.amount != null ? ` · ${fmtMoney(r.amount, r.currency)}` : ""}
                      {!r.done ? ` · ${days === 0 ? "сьогодні" : days > 0 ? `через ${days} дн.` : `прострочено на ${Math.abs(days)} дн.`}` : ""}
                    </p>
                    {r.note ? <p className="text-xs mt-1" style={{ color: "var(--text-dim)" }}>{r.note}</p> : null}
                  </div>
                  <div className="flex items-center gap-1 shrink-0">
                    <button onClick={() => openEdit(r)} className="p-1.5 rounded-lg" style={{ color: "var(--text-dim)" }}><Edit3 size={14} /></button>
                    <button onClick={() => deleteReminder(r.id)} className="p-1.5 rounded-lg" style={{ color: "var(--danger)" }}><Trash2 size={14} /></button>
                  </div>
                </div>
              </Card>
            );
          })}
          {sorted.length === 0 && <p className="text-sm text-center py-10" style={{ color: "var(--text-dim)" }}>Немає нагадувань</p>}
        </div>
      </div>
    </div>
  );
}

/* ---------- Pocket Detail (full-screen account view, Monobank-style) ---------- */

      <div className="mono-circle"><Ic size={18} color="#fff" /></div>
      <span className="text-[11px] font-medium text-center leading-tight" style={{ color: "var(--text-dim)" }}>{label}</span>
    </button>
  );
}

function PocketDetailModal({ pocketId, onClose, getPocket, pocketBalance, pocketLabel, transactions, categories, setModal, editTransaction, deleteTransaction, duplicateTransaction, archivePocket }) {
  const pocket = getPocket(pocketId);
  if (!pocket || !pocket.account) return null;
  const acc = pocket.account;
  const balance = pocketBalance(pocketId);

  const history = useMemo(() =>
    transactions

/* ---------- Pocket Modal (add / edit a currency sub-account) ---------- */
function PocketModal({ onClose, accountId, existing, accounts, pockets, addPocket, editPocket, currencies }) {
  const account = accounts.find((a) => a.id === accountId);
  const usedCurrencies = pockets.filter((p) => p.accountId === accountId && p.id !== existing?.id).map((p) => p.currency);
  const pool = currencies || CURRENCIES;
  const availableCurrencies = pool.filter((c) => !usedCurrencies.includes(c) || c === existing?.currency);
  const [currency, setCurrency] = useState(existing?.currency || availableCurrencies[0] || "UAH");
  const [balance, setBalance] = useState(existing ? String(existing.initialBalance) : "0");
  const [error, setError] = useState("");
  const currencyChanged = existing && currency !== existing.currency;

  const submit = () => {
    if (!currency) return setError("Оберіть валюту");
    if (existing) editPocket(existing.id, { currency, initialBalance: parseFloat(balance) || 0 });
    else addPocket(accountId, currency, balance);
    onClose();
  };

  return (
    <Modal title={existing ? `Субрахунок ${account?.name}` : `Новий валютний субрахунок · ${account?.name}`} onClose={onClose}>
      <Field label="Валюта" error={error}>
        <Select value={currency} onChange={(e) => setCurrency(e.target.value)}>
          {availableCurrencies.map((c) => <option key={c} value={c}>{c}</option>)}
        </Select>
      </Field>
      {currencyChanged && <p className="text-xs mb-3" style={{ color: "var(--warn)" }}>Зміна валюти не конвертує вже наявні операції — вони залишаться у своїх сумах.</p>}
      <Field label={existing ? "Початковий баланс (без транзакцій)" : "Початковий баланс"}>
        <Input type="number" step="0.01" inputMode="decimal" value={balance} onChange={(e) => setBalance(e.target.value)} placeholder="0" />
      </Field>
      {availableCurrencies.length === 0 && !existing && <p className="text-xs mb-3" style={{ color: "var(--danger)" }}>Усі доступні валюти вже додані до цього рахунку.</p>}
      <Button className="w-full mt-2" onClick={submit} disabled={!existing && availableCurrencies.length === 0}>{existing ? "Зберегти зміни" : "Додати субрахунок"}</Button>
    </Modal>
  );
}

/* ---------- Transaction (income/expense) Modal ---------- */
function TransactionModal({ onClose, kind, editing, presetPocketId, accounts, pockets, categories, addTransaction, editTransaction }) {
  const isIncome = kind === "income";
  const cats = categories.filter((c) => c.type === kind && !c.archived);
  const firstPocket = pockets.find((p) => !p.archived);
  const [amount, setAmount] = useState(editing?.amount || "");
  const [pocketId, setPocketId] = useState(editing?.pocketId || presetPocketId || firstPocket?.id || "");
  const [categoryId, setCategoryId] = useState(editing?.categoryId || cats[0]?.id || "");
  const [date, setDate] = useState(editing?.date || new Date().toISOString().slice(0, 10));
  const [note, setNote] = useState(editing?.note || "");
  const [receipt, setReceipt] = useState(editing?.receipt || null);
  const [error, setError] = useState("");

  const currentPocket = pockets.find((p) => p.id === pocketId);
  const currency = currentPocket?.currency || "UAH";

  const handleReceipt = (e) => {
    const file = e.target.files?.[0];
    if (!file) return;
    const reader = new FileReader();
    reader.onload = () => setReceipt(reader.result);
    reader.readAsDataURL(file);
  };

  const submit = () => {
    const amt = parseFloat(amount);
    if (!amt || amt <= 0) return setError("Введіть коректну суму");
    if (!pocketId) return setError("Оберіть рахунок");
    if (!categoryId) return setError("Оберіть категорію");
    const data = { type: kind, amount: amt, currency, pocketId, categoryId, date, note, receipt };
    if (editing) editTransaction(editing.id, data); else addTransaction(data);
    onClose();
  };

  return (
    <Modal title={editing ? "Редагувати операцію" : isIncome ? "Додати дохід" : "Додати витрату"} onClose={onClose}>
      <Field label="Рахунок">
        <PocketSelect accounts={accounts} pockets={pockets} value={pocketId} onChange={setPocketId} />
      </Field>
      <Field label={`Сума (${currency})`} error={error}>
        <Input type="number" step="0.01" value={amount} onChange={(e) => { setAmount(e.target.value); setError(""); }} placeholder="0.00" />
      </Field>
      <Field label="Категорія">
        <div className="grid grid-cols-4 gap-2">
          {cats.map((c) => (
            <button key={c.id} onClick={() => setCategoryId(c.id)} className="flex flex-col items-center gap-1 p-2 rounded-xl" style={{ background: categoryId === c.id ? "var(--surface2)" : "transparent", border: categoryId === c.id ? `1px solid ${c.color}` : "1px solid var(--border)" }}>
              <Icon name={c.icon} size={16} style={{ color: c.color }} />
              <span className="text-[10px] text-center leading-tight" style={{ color: "var(--text)" }}>{c.name}</span>
            </button>
          ))}
        </div>
      </Field>
      <Field label="Дата"><Input type="date" value={date} onChange={(e) => setDate(e.target.value)} /></Field>
      <Field label="Опис / коментар"><Textarea rows={2} value={note} onChange={(e) => setNote(e.target.value)} placeholder="Необов'язково" /></Field>
      <Field label="Фото чеку (необов'язково)">
        <input type="file" accept="image/*" onChange={handleReceipt} className="text-xs" style={{ color: "var(--text-dim)" }} />
        {receipt && <img src={receipt} alt="чек" className="mt-2 h-24 rounded-lg object-cover" />}
      </Field>
      <Button className="w-full mt-2" onClick={submit}>{editing ? "Зберегти зміни" : "Зберегти"}</Button>
    </Modal>
  );
}

/* ---------- Transfer / Exchange Modal ---------- */
function TransferExchangeModal({ onClose, mode, presetFromPocketId, accounts, pockets, rates, addTransaction }) {
  const isExchange = mode === "exchange";
  const active = pockets.filter((p) => !p.archived);
  const [fromPocketId, setFromPocketId] = useState(presetFromPocketId || active[0]?.id || "");
  const [toPocketId, setToPocketId] = useState(active.find((p) => p.id !== (presetFromPocketId || active[0]?.id))?.id || active[0]?.id || "");
  const [fromAmount, setFromAmount] = useState("");
  const [rate, setRate] = useState(1);
  const [toAmount, setToAmount] = useState("");
  const [fee, setFee] = useState(0);
  const [date, setDate] = useState(new Date().toISOString().slice(0, 10));
  const [note, setNote] = useState("");
  const [error, setError] = useState("");
  const [manualTo, setManualTo] = useState(false);

  const fromPocket = pockets.find((p) => p.id === fromPocketId);
  const toPocket = pockets.find((p) => p.id === toPocketId);
  const fromCurrency = fromPocket?.currency || "UAH";
  const toCurrency = toPocket?.currency || "UAH";
  const crossCurrency = fromCurrency !== toCurrency;

  useEffect(() => {
    if (crossCurrency) setRate(Math.round(convert(1, fromCurrency, toCurrency, rates) * 10000) / 10000);
    else setRate(1);
  }, [fromCurrency, toCurrency, crossCurrency]);

  useEffect(() => {
    if (manualTo) return;
    const amt = parseFloat(fromAmount) || 0;
    const f = parseFloat(fee) || 0;
    const computed = crossCurrency ? amt * rate - f : amt - f;
    setToAmount(computed > 0 ? Math.round(computed * 100) / 100 : 0);
  }, [fromAmount, rate, fee, crossCurrency, manualTo]);

  const submit = () => {
    const amt = parseFloat(fromAmount);
    if (!amt || amt <= 0) return setError("Введіть коректну суму списання");
    if (!fromPocketId || !toPocketId) return setError("Оберіть рахунки");
    if (fromPocketId === toPocketId) return setError("Оберіть різні рахунки");
    const to = parseFloat(toAmount);
    if (!to || to <= 0) return setError("Сума зарахування має бути додатною");
    addTransaction({ type: isExchange ? "exchange" : "transfer", date, fromPocketId, toPocketId, fromAmount: amt, fromCurrency, toAmount: to, toCurrency, rate: crossCurrency ? rate : 1, fee: parseFloat(fee) || 0, note });
    onClose();
  };

  return (
    <Modal title={isExchange ? "Обмін валюти" : "Переказ між рахунками"} onClose={onClose}>
      <Field label="Рахунок списання">
        <PocketSelect accounts={accounts} pockets={pockets} value={fromPocketId} onChange={setFromPocketId} />
      </Field>
      <Field label="Рахунок зарахування">
        <PocketSelect accounts={accounts} pockets={pockets} value={toPocketId} onChange={setToPocketId} excludePocketId={fromPocketId} />
      </Field>
      <Field label={`Сума списання (${fromCurrency})`} error={error}>
        <Input type="number" step="0.01" value={fromAmount} onChange={(e) => { setFromAmount(e.target.value); setError(""); }} />
      </Field>
      {crossCurrency && (
        <Field label={`Курс обміну (1 ${fromCurrency} = X ${toCurrency})`}><Input type="number" step="0.0001" value={rate} onChange={(e) => setRate(parseFloat(e.target.value) || 0)} /></Field>
      )}
      <Field label={`Комісія (${crossCurrency ? toCurrency : fromCurrency}, необов'язково)`}><Input type="number" step="0.01" value={fee} onChange={(e) => setFee(e.target.value)} /></Field>
      <Field label={`Сума зарахування (${toCurrency})`}><Input type="number" step="0.01" value={toAmount} onChange={(e) => { setToAmount(e.target.value); setManualTo(true); }} /></Field>
      <Field label="Дата"><Input type="date" value={date} onChange={(e) => setDate(e.target.value)} /></Field>
      <Field label="Коментар"><Textarea rows={2} value={note} onChange={(e) => setNote(e.target.value)} placeholder="Необов'язково" /></Field>
      <Button className="w-full mt-2" onClick={submit}>{isExchange ? "Обміняти" : "Переказати"}</Button>
    </Modal>
  );
}

    if (!borrower.trim()) return setError("Введіть імʼя позичальника");
    if (!dueDate) return setError("Оберіть дату повернення");
    editLoan(loan.id, { borrower: borrower.trim(), dueDate, note: note.trim() });
    onClose();
  };
  return (
    <Modal title="Редагувати позику" onClose={onClose}>
      <p className="text-xs mb-3" style={{ color: "var(--text-dim)" }}>Суму, валюту й рахунок змінити не можна (вони пов'язані з операцією видачі). Можна відкоригувати позичальника, дату й коментар.</p>
      <Field label="Кому позичено" error={error}><Input value={borrower} onChange={(e) => { setBorrower(e.target.value); setError(""); }} /></Field>
      <Field label="Дата повернення"><Input type="date" value={dueDate} onChange={(e) => setDueDate(e.target.value)} /></Field>
      <Field label="Коментар / домовленість"><Textarea rows={2} value={note} onChange={(e) => setNote(e.target.value)} placeholder="Необов'язково" /></Field>
      <Button className="w-full mt-2" onClick={submit}>Зберегти</Button>
    </Modal>
  );
}

/* ---------- Loan Return Modal ---------- */
function LoanReturnModal({ onClose, loan, accounts, pockets, registerLoanReturn, loanRemaining }) {
  const active = pockets.filter((p) => !p.archived && p.currency === loan.currency);
  const remaining = loanRemaining(loan);
  const [amount, setAmount] = useState(remaining);
  const [pocketId, setPocketId] = useState(active.find((p) => p.id === loan.pocketId)?.id || active[0]?.id || "");
  const [date, setDate] = useState(new Date().toISOString().slice(0, 10));
  const [note, setNote] = useState("");
  const [error, setError] = useState("");

  const submit = () => {
    const amt = parseFloat(amount);
    if (!amt || amt <= 0) return setError("Введіть коректну суму повернення");
    if (amt > remaining + 0.005) return setError(`Сума не може перевищувати залишок боргу (${fmtMoney(remaining, loan.currency)})`);
    if (!pocketId) return setError("Оберіть рахунок зарахування");
    registerLoanReturn(loan.id, amt, pocketId, loan.currency, date, note);
    onClose();
  };

  return (
    <Modal title={`Повернення позики: ${loan.borrower}`} onClose={onClose}>
      <p className="text-sm mb-4 px-3 py-2 rounded-lg" style={{ background: "var(--surface2)", color: "var(--text-dim)" }}>
        Залишок боргу: <strong style={{ color: "var(--text)" }}>{fmtMoney(remaining, loan.currency)}</strong>
      </p>
      <Field label={`Сума повернення (${loan.currency})`} error={error}>
        <Input type="number" step="0.01" max={remaining} value={amount} onChange={(e) => { setAmount(e.target.value); setError(""); }} />
      </Field>
      <Field label={`Рахунок зарахування (валюта ${loan.currency})`}>
        <PocketSelect accounts={accounts} pockets={active} value={pocketId} onChange={setPocketId} />
      </Field>
      <Field label="Дата повернення"><Input type="date" value={date} onChange={(e) => setDate(e.target.value)} /></Field>
      <Field label="Коментар"><Textarea rows={2} value={note} onChange={(e) => setNote(e.target.value)} placeholder="Необов'язково" /></Field>
      <Button className="w-full mt-2" onClick={submit}>Зареєструвати повернення</Button>
    </Modal>
  );
}


if (_boot) { _boot.remove(); }
ReactDOM.createRoot(document.getElementById("root")).render(React.createElement(FinanceTracker));

</script>
</body>
</html>
