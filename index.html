/* ============================== HELPERS ============================== */

function fmtMoney(amount, currency) {
  const sym = CURRENCY_SYMBOLS[currency] || currency;
  const n = Number(amount) || 0;
  const formatted = n.toLocaleString(locale(), { minimumFractionDigits: 2, maximumFractionDigits: 2 });
  return `${formatted} ${sym}`;
}

function fmtDate(d) {
  const date = new Date(d);
  return date.toLocaleDateString(locale(), { day: "2-digit", month: "2-digit", year: "numeric" });
}

function daysBetween(a, b) {
  const MS = 1000 * 60 * 60 * 24;
  return Math.round((new Date(b).setHours(0, 0, 0, 0) - new Date(a).setHours(0, 0, 0, 0)) / MS);
}

function convert(amount, from, to, ratesToUAH) {
  if (from === to) return amount;
  const uahAmount = amount * (ratesToUAH[from] || 1);
  return uahAmount / (ratesToUAH[to] || 1);
}

// Convert a transaction to the base currency using the rate snapshotted when it was created
// (t.fx = rate of the transaction's currency to UAH at creation time). Falls back to current rate.
function txToBase(t, base, ratesToUAH) {
  const fx = t.fx != null ? t.fx : (ratesToUAH[t.currency] || 1);
  return (t.amount * fx) / (ratesToUAH[base] || 1);
}

// Save a file letting the user CHOOSE where:
//   1) desktop Chromium — native "Save As" dialog (File System Access API)
//   2) iPhone / mobile   — the system share sheet ("Save to Files", AirDrop, apps…)
//   3) otherwise         — a normal download
// Returns: "saved" | "shared" | "downloaded" | "cancelled".
async function saveFile(filename, content, mime) {
  const blob = content instanceof Blob ? content : new Blob([content], { type: mime });
  const ext = filename.slice(filename.lastIndexOf("."));
  const cleanMime = (mime || "application/octet-stream").split(";")[0];
  if (typeof window !== "undefined" && window.showSaveFilePicker) {
    try {
      const handle = await window.showSaveFilePicker({ suggestedName: filename, types: [{ description: filename, accept: { [cleanMime]: [ext] } }] });
      const writable = await handle.createWritable();
      await writable.write(blob);
      await writable.close();
      return "saved";
    } catch (e) {
      if (e && e.name === "AbortError") return "cancelled";
    }
  }
  try {
    const file = new File([blob], filename, { type: cleanMime });
    if (navigator.canShare && navigator.canShare({ files: [file] })) {
      await navigator.share({ files: [file], title: filename });
      return "shared";
    }
  } catch (e) {
    if (e && e.name === "AbortError") return "cancelled";
  }
  const url = URL.createObjectURL(blob);
  const a = document.createElement("a");
  a.href = url;
  a.download = filename;
  document.body.appendChild(a); a.click(); a.remove();
  setTimeout(function () { URL.revokeObjectURL(url); }, 1500);
  return "downloaded";
}

// Sort transactions newest-first: by date, then by creation time for same-day ties
function byRecent(a, b) {
  if (a.date !== b.date) return a.date < b.date ? 1 : -1;
  const ca = a.createdAt || "", cb = b.createdAt || "";
  return ca < cb ? 1 : ca > cb ? -1 : 0;
}

function Icon({ name, size = 18, className = "", style = {} }) {
  const C = ICONS[name] || MoreHorizontal;
  return <C size={size} className={className} style={style} />;
}

let LANG = loadLang();
// Translate a display string. Unknown text (e.g. names the user typed) is returned unchanged.
function tr(s) {
  if (LANG !== "en" || typeof s !== "string" || !s) return s;
  if (EN_DICT[s] !== undefined) return EN_DICT[s];
  for (let i = 0; i < EN_RULES.length; i++) {
    const m = s.match(EN_RULES[i][0]);
    if (m) return EN_RULES[i][1].replace(/\$(\d)/g, function (_, d) { return m[Number(d)]; });
  }
  return s;
}
function locale() { return LANG === "en" ? "en-GB" : "uk-UA"; }

const STORAGE_KEY = "financeTrackerUA_v2";

function loadState() {
  try {
    const raw = window.localStorage ? window.localStorage.getItem(STORAGE_KEY) : null;
    if (raw) return migrateState(JSON.parse(raw));
  } catch (e) { /* ignore */ }
  return null;
}
// One-time backfill: lock the FX rate of existing income/expense transactions to the stored rate,
// so future rate edits don't retroactively change historical totals.
function migrateState(s) {
  if (s && Array.isArray(s.transactions) && s.rates) {
    const todayStr = new Date().toISOString().slice(0, 10);
    s.transactions = s.transactions.map(function (t) {
      let nt = t;
      if ((t.type === "income" || t.type === "expense") && t.fx == null) {
        nt = Object.assign({}, nt, { fx: s.rates[t.currency] || 1 });
      }
      if (nt.date > todayStr) {
        nt = Object.assign({}, nt, { date: todayStr });
      }
      return nt;
    });
  }
  if (s && Array.isArray(s.loans)) {
    s.loans = s.loans.map(function (l) { return l.direction ? l : Object.assign({}, l, { direction: "out" }); });
  }
  return s;
}
function saveState(state) {
  try { if (window.localStorage) window.localStorage.setItem(STORAGE_KEY, JSON.stringify(state)); } catch (e) { /* ignore */ }
}

/* PIN is stored on the device only (not synced) */
const PIN_KEY = "ft_pin";
function loadPin() { try { return window.localStorage ? window.localStorage.getItem(PIN_KEY) : null; } catch (e) { return null; } }
function savePin(v) { try { if (window.localStorage) { if (v) window.localStorage.setItem(PIN_KEY, v); else window.localStorage.removeItem(PIN_KEY); } } catch (e) {} }
/* When to re-lock after leaving the app: seconds of being in background (0 = immediately) */
const PIN_DELAY_KEY = "ft_pin_delay";
function loadPinDelay() { try { const v = window.localStorage ? window.localStorage.getItem(PIN_DELAY_KEY) : null; return v == null ? 0 : parseInt(v, 10) || 0; } catch (e) { return 0; } }
function savePinDelay(sec) { try { if (window.localStorage) window.localStorage.setItem(PIN_DELAY_KEY, String(sec)); } catch (e) {} }

/* First-run consent (stored on device) */
const CONSENT_KEY = "ft_consent";
function loadConsent() { try { return window.localStorage ? window.localStorage.getItem(CONSENT_KEY) === "1" : false; } catch (e) { return false; } }
function saveConsent() { try { if (window.localStorage) window.localStorage.setItem(CONSENT_KEY, "1"); } catch (e) {} }

/* ============================== CLOUD SYNC (Supabase) ============================== *//*
  Встав свої два значення зі Supabase (Project Settings → API).
  Якщо лишити порожніми — застосунок працює лише локально, без хмари.
*/
const SUPABASE_URL = "";        // ← Project URL, напр. https://xxxx.supabase.co
const SUPABASE_ANON_KEY = "";   // ← anon public key

const SB = (typeof supabase !== "undefined" && SUPABASE_URL && SUPABASE_ANON_KEY)
  ? supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY)
  : null;

async function cloudPull(userId) {
  if (!SB || !userId) return null;
  const { data, error } = await SB.from("app_state").select("data").eq("user_id", userId).maybeSingle();
  if (error) { console.warn("cloudPull:", error.message); return null; }
  return data ? data.data : null;
}

let _pushTimer = null;
function cloudPush(userId, state) {
  if (!SB || !userId) return;
  clearTimeout(_pushTimer);
  _pushTimer = setTimeout(async () => {
    const { error } = await SB.from("app_state").upsert({ user_id: userId, data: state, updated_at: new Date().toISOString() });
    if (error) console.warn("cloudPush:", error.message);
  }, 800);
}

// Swipe a row left (on touch) to reveal action buttons on the right.
function SwipeRow({ children, actions, rounded = false }) {
  const [open, setOpen] = useState(false);
  const sx = React.useRef(0), sy = React.useRef(0);
  const w = actions.length * 66;
  const onTouchStart = (e) => { const t = e.touches[0]; sx.current = t.clientX; sy.current = t.clientY; };
  const onTouchEnd = (e) => {
    const t = e.changedTouches[0];
    const dx = t.clientX - sx.current, dy = t.clientY - sy.current;
    if (Math.abs(dx) > Math.abs(dy) && Math.abs(dx) > 40) setOpen(dx < 0);
  };
  return (
    <div className={`relative overflow-hidden ${rounded ? "rounded-2xl" : ""}`} onTouchStart={onTouchStart} onTouchEnd={onTouchEnd}>
      <div className="absolute inset-y-0 right-0 flex" style={{ background: "var(--surface2)" }}>
        {actions.map((a, i) => {
          const Ic = a.icon;
          return (
            <button key={i} onClick={() => { a.onClick(); setOpen(false); }} className="flex flex-col items-center justify-center gap-0.5 text-[10px] font-medium" style={{ width: 66, background: a.bg, color: a.fg || "#fff" }}>
              <Ic size={16} />{a.label}
            </button>
          );
        })}
      </div>
      <div style={{ transform: `translateX(${open ? -w : 0}px)`, transition: "transform .2s ease", position: "relative" }}>
        {children}
      </div>
    </div>
  );
}

// PIN lock screen shown on app open when a PIN is set
function LockScreen({ pin, onUnlock }) {
  const [entry, setEntry] = useState("");
  const [err, setErr] = useState(false);
  const press = (d) => {
    if (entry.length >= pin.length) return;
    const nx = entry + d;
    setErr(false);
    setEntry(nx);
    if (nx.length === pin.length) {
      if (nx === pin) { setTimeout(onUnlock, 120); }
      else { setErr(true); setTimeout(() => setEntry(""), 450); }
    }
  };
  const del = () => setEntry((e) => e.slice(0, -1));
  const dots = pin.split("").map((_, i) => i);
  return (
    <div className="fixed inset-0 z-[100] flex flex-col items-center justify-center px-8" style={{ background: "var(--bg)", paddingTop: "env(safe-area-inset-top)", paddingBottom: "env(safe-area-inset-bottom)" }}>

      <div className="flex gap-3 mb-9">
        {dots.map((i) => (
          <div key={i} className="w-3 h-3 rounded-full transition" style={{ background: i < entry.length ? (err ? "var(--danger)" : "var(--accent)") : "var(--surface2)" }} />
        ))}
      </div>
      <div className="grid grid-cols-3 gap-4">
        {[1, 2, 3, 4, 5, 6, 7, 8, 9].map((n) => (
          <button key={n} onClick={() => press(String(n))} className="w-16 h-16 rounded-full text-xl font-semibold active:scale-95 transition" style={{ background: "var(--surface2)", color: "var(--text)" }}>{n}</button>

  );

// Coach-mark tour: dims the screen and spotlights one element at a time with a tooltip
function TourOverlay({ step, setStep, onClose, setView }) {
  const [rect, setRect] = useState(null);
  const cur = TOUR_STEPS[step];
  const last = step >= TOUR_STEPS.length - 1;
  useEffect(() => {
    if (!cur) return;
    // Some steps live on another screen — switch there first, then find the target.
    if (cur.view && setView) setView(cur.view);
    let cancelled = false;
    let el = null;
    const measure = () => {
      if (!el || cancelled) return;
      const r = el.getBoundingClientRect();
      setRect({ top: r.top, left: r.left, width: r.width, height: r.height });
    };
    // The target may not exist until the new screen has rendered — retry briefly.
    let tries = 0;
    const find = () => {
      if (cancelled) return;
      el = document.querySelector(cur.sel);
      if (el) {
        try { el.scrollIntoView({ block: "center", behavior: "smooth" }); } catch (e) {}
        measure();
        setTimeout(measure, 380);
      } else if (tries++ < 12) {
        setTimeout(find, 60);
      } else {
        setRect(null); // no anchor on this screen — show the tip centred
      }
    };
    setRect(null);
    setTimeout(find, 60);
    window.addEventListener("resize", measure);
    window.addEventListener("scroll", measure, true);
    return () => { cancelled = true; window.removeEventListener("resize", measure); window.removeEventListener("scroll", measure, true); };
  }, [step]);

  const pad = 8;
  const hole = rect ? { top: rect.top - pad, left: rect.left - pad, width: rect.width + pad * 2, height: rect.height + pad * 2 } : null;
  let vpos = { bottom: 28 };
  if (hole) {
    const below = hole.top + hole.height + 14;
    const vh = typeof window !== "undefined" ? window.innerHeight : 800;
    if (vh - below > 190) vpos = { top: below };
    else vpos = { bottom: Math.max(16, vh - hole.top + 14) };
  }
  return (
    <div className="fixed inset-0 z-[130]">
      {hole ? (
        <div style={{ position: "fixed", top: hole.top, left: hole.left, width: hole.width, height: hole.height, borderRadius: 14, boxShadow: "0 0 0 9999px rgba(6,10,18,0.80)", border: "2px solid var(--accent)", transition: "top .25s ease, left .25s ease, width .25s ease, height .25s ease", pointerEvents: "none" }} />
      ) : (
        <div style={{ position: "fixed", inset: 0, background: "rgba(6,10,18,0.80)" }} onClick={onClose} />
      )}
      <div className="fixed px-4" style={{ left: 0, right: 0, ...vpos }}>
        <div className="rounded-2xl p-4 mx-auto" style={{ background: "var(--surface)", border: "1px solid var(--border)", boxShadow: "var(--shadow)", maxWidth: 460 }}>
          <div className="flex items-center justify-between mb-1.5">
            <span className="text-[11px] font-semibold" style={{ color: "var(--accent)" }}>{tr("Крок")} {step + 1} {tr("з")} {TOUR_STEPS.length}</span>
            <button onClick={onClose} className="text-[11px] font-medium" style={{ color: "var(--text-dim)" }}>{tr("Пропустити")}</button>
          </div>
          <h3 className="font-display font-bold text-base mb-1">{tr(cur.title)}</h3>
          <p className="text-sm mb-3" style={{ color: "var(--text-dim)" }}>{tr(cur.text)}</p>
          <div className="flex gap-2 justify-end">
            {step > 0 && <Button variant="secondary" onClick={() => setStep(step - 1)}>{tr("Назад")}</Button>}
            <Button onClick={() => (last ? onClose() : setStep(step + 1))}>{last ? tr("Готово") : tr("Далі")}</Button>
          </div>
        </div>
      </div>
    </div>
  );
}

function FinanceTracker() {
  const [state, setState] = useState(() => loadState() || buildDemoData());
  const [theme, setTheme] = useState(() => (loadState() && loadState().theme) || "dark");
  const [view, setView] = useState("dashboard");
  const [modal, setModal] = useState(null);
  const [toast, setToast] = useState(null);
  const [session, setSession] = useState(null);
  const [pin, setPinState] = useState(() => loadPin());
  const [locked, setLocked] = useState(() => !!loadPin());
  const [pinDelay, setPinDelayState] = useState(() => loadPinDelay());
  const hiddenAtRef = React.useRef(null);
  // Re-lock when returning from background. Records when the app was hidden and, on return,
  // locks if the time away >= the chosen delay (0 = immediately). More reliable on iOS than
  // locking during the hide event, because the "resume" events fire while the app is active.
  useEffect(() => {
    if (!pin) return;
    const markHidden = () => { if (hiddenAtRef.current == null) hiddenAtRef.current = Date.now(); };
    const checkResume = () => {
      if (hiddenAtRef.current == null) return;
      const away = Date.now() - hiddenAtRef.current;
      hiddenAtRef.current = null;
      if (away >= pinDelay * 1000) setLocked(true);
    };
    const onVis = () => { if (document.visibilityState === "hidden") markHidden(); else checkResume(); };
    document.addEventListener("visibilitychange", onVis);
    window.addEventListener("pagehide", markHidden);
    window.addEventListener("pageshow", checkResume);
    return () => {
      document.removeEventListener("visibilitychange", onVis);
      window.removeEventListener("pagehide", markHidden);
      window.removeEventListener("pageshow", checkResume);
    };
  }, [pin, pinDelay]);
  const [splash, setSplash] = useState(() => !loadState());
  const [consented, setConsented] = useState(() => loadConsent());
  const acceptConsent = () => { saveConsent(); setConsented(true); };
  const [tourStep, setTourStep] = useState(null);
  const [lang, setLang] = useState(() => loadLang());
  LANG = lang; // module-level, read by tr() in every child rendered after this
  const applyLang = (v) => { saveLang(v); setLang(v); };
  const startTour = () => { setView("dashboard"); setModal(null); setTimeout(() => setTourStep(0), 320); };
  useEffect(() => { if (splash) { const t = setTimeout(() => setSplash(false), 1300); return () => clearTimeout(t); } }, []);

  const stateRef = React.useRef(state);
  useEffect(() => { stateRef.current = { ...state, theme }; }, [state, theme]);

  // save locally + push to cloud (when signed in)
  useEffect(() => {
    const full = { ...state, theme };
    saveState(full);
    if (session) cloudPush(session.user.id, full);
  }, [state, theme, session]);

  // track auth session
  useEffect(() => {
    if (!SB) return;
    SB.auth.getSession().then(({ data }) => setSession(data.session || null));
    const { data: sub } = SB.auth.onAuthStateChange((_e, s) => setSession(s || null));
    return () => { if (sub && sub.subscription) sub.subscription.unsubscribe(); };
  }, []);

  // on sign-in: pull cloud state, or seed cloud from this device if empty
  useEffect(() => {
    if (!SB || !session) return;
    let cancelled = false;
    cloudPull(session.user.id).then((cloud) => {
      if (cancelled) return;
      if (cloud && cloud.accounts) {
        setState({ accounts: cloud.accounts, pockets: cloud.pockets, categories: cloud.categories, transactions: cloud.transactions, loans: cloud.loans, rates: cloud.rates, baseCurrency: cloud.baseCurrency, reminders: cloud.reminders || [] });
        if (cloud.theme) setTheme(cloud.theme);
        setToast(tr("Дані завантажено з хмари"));
      } else {
        cloudPush(session.user.id, stateRef.current);
        setToast(tr("Дані збережено в хмару"));
      }
    });
    return () => { cancelled = true; };
  }, [session]);

  useEffect(() => {
    if (!toast) return;
    const t = setTimeout(() => setToast(null), 2600);
    return () => clearTimeout(t);
  }, [toast]);

  const { accounts, pockets, categories, transactions, loans, rates, baseCurrency } = state;
  const currencyList = ["UAH"].concat(Object.keys(rates).filter((c) => c !== "UAH"));
  const reminders = state.reminders || [];
  const goals = state.goals || [];
  const crypto = state.crypto || [];
  const cryptoPrices = state.cryptoPrices || {};
  const update = (patch) => setState((s) => ({ ...s, ...patch }));
  const notify = (msg) => setToast(msg);

  /* ---------- pocket / account helpers ---------- */
  const getPocket = useCallback((pocketId) => {
    const pocket = pockets.find((p) => p.id === pocketId);
    if (!pocket) return null;
    const account = accounts.find((a) => a.id === pocket.accountId);
    return { ...pocket, account };
  }, [pockets, accounts]);

  const pocketBalance = useCallback((pocketId) => {
    const pocket = pockets.find((p) => p.id === pocketId);
    if (!pocket) return 0;
    let bal = pocket.initialBalance || 0;
    transactions.forEach((tx) => {
      if (tx.type === "income" && tx.pocketId === pocketId) bal += tx.amount;
      else if (tx.type === "expense" && tx.pocketId === pocketId) bal -= tx.amount;
      else if (tx.type === "transfer" || tx.type === "exchange") {
        if (tx.fromPocketId === pocketId) bal -= tx.fromAmount;
        if (tx.toPocketId === pocketId) bal += tx.toAmount;
      } else if (tx.type === "loan_out" && tx.pocketId === pocketId) bal -= tx.amount;
      else if (tx.type === "loan_return" && tx.pocketId === pocketId) bal += tx.amount;
      else if (tx.type === "debt_take" && tx.pocketId === pocketId) bal += tx.amount;
      else if (tx.type === "debt_repay" && tx.pocketId === pocketId) bal -= tx.amount;
    });
    return bal;
  }, [pockets, transactions]);

  const accountPockets = useCallback((accountId, includeArchived = false) =>
    pockets.filter((p) => p.accountId === accountId && (includeArchived || !p.archived)),
  [pockets]);

  const accountTotalBase = useCallback((accountId) =>
    accountPockets(accountId).reduce((sum, p) => sum + convert(pocketBalance(p.id), p.currency, baseCurrency, rates), 0),
  [accountPockets, pocketBalance, baseCurrency, rates]);

  const pocketLabel = (pocketId) => {
    const p = getPocket(pocketId);
    if (!p) return tr("Видалений рахунок");
    const acc = tr(p.account?.name) || tr("Рахунок");
    return p.name ? `${acc} · ${tr(p.name)} · ${p.currency}` : `${acc} · ${p.currency}`;
  };

  const activePockets = useMemo(() =>
    pockets.filter((p) => !p.archived && !accounts.find((a) => a.id === p.accountId)?.archived),
  [pockets, accounts]);

  const totalInBase = useMemo(() =>
    activePockets.reduce((sum, p) => sum + convert(pocketBalance(p.id), p.currency, baseCurrency, rates), 0),
  [activePockets, pocketBalance, baseCurrency, rates]);

  const byCurrencyTotals = useMemo(() => {
    const m = {};
    activePockets.forEach((p) => { m[p.currency] = (m[p.currency] || 0) + pocketBalance(p.id); });
    return m;
  }, [activePockets, pocketBalance]);

  /* ---------- month stats ---------- */
  const now = new Date();
  const monthKey = (d) => d.slice(0, 7);
  const thisMonthKey = now.toISOString().slice(0, 7);
  const monthTx = transactions.filter((t) => (t.type === "income" || t.type === "expense") && monthKey(t.date) === thisMonthKey);
  const monthIncome = monthTx.filter((t) => t.type === "income").reduce((s, t) => s + txToBase(t, baseCurrency, rates), 0);
  const monthExpense = monthTx.filter((t) => t.type === "expense").reduce((s, t) => s + txToBase(t, baseCurrency, rates), 0);

  const categoryBreakdown = useMemo(() => {
    const m = {};
    monthTx.filter((t) => t.type === "expense").forEach((t) => {
      const cat = categories.find((c) => c.id === t.categoryId);
      const key = cat ? cat.name : tr("Інше");
      m[key] = (m[key] || 0) + txToBase(t, baseCurrency, rates);
    });
    return Object.entries(m).map(([name, value]) => ({ name, value, color: (categories.find((c) => c.name === name) || {}).color || "#8B93A3" })).sort((a, b) => b.value - a.value);
  }, [monthTx, categories, baseCurrency, rates]);

  const monthlySeries = useMemo(() => {
    const arr = [];
    for (let i = 5; i >= 0; i--) {
      const d = new Date(now.getFullYear(), now.getMonth() - i, 1);
      const key = d.toISOString().slice(0, 7);
      const inc = transactions.filter((t) => t.type === "income" && monthKey(t.date) === key).reduce((s, t) => s + txToBase(t, baseCurrency, rates), 0);
      const exp = transactions.filter((t) => t.type === "expense" && monthKey(t.date) === key).reduce((s, t) => s + txToBase(t, baseCurrency, rates), 0);
      arr.push({ month: MONTHS_UA[d.getMonth()], income: Math.round(inc), expense: Math.round(exp) });
    }
    return arr;
  }, [transactions, baseCurrency, rates]);

  // Budgets: spent this month vs the category's monthly limit (limit interpreted in base currency)
  const budgetStatus = useMemo(() =>
    categories.filter((c) => c.type === "expense" && !c.archived && c.budget > 0).map((c) => {
      const spent = monthTx.filter((t) => t.type === "expense" && t.categoryId === c.id).reduce((s, t) => s + txToBase(t, baseCurrency, rates), 0);
      const pct = c.budget > 0 ? Math.min(999, (spent / c.budget) * 100) : 0;
      return { id: c.id, name: c.name, color: c.color, icon: c.icon, spent, budget: c.budget, pct };
    }).sort((a, b) => b.pct - a.pct)
  , [categories, monthTx, baseCurrency, rates]);

  // Net worth (total capital) at the end of each of the last 6 months, in the base currency
  const netWorthSeries = useMemo(() => {
    const arr = [];
    const nm = new Date();
    for (let i = 5; i >= 0; i--) {
      const d = new Date(nm.getFullYear(), nm.getMonth() - i + 1, 0);
      const cutoff = d.toISOString().slice(0, 10);
      let total = 0;
      pockets.forEach((p) => {
        let bal = p.initialBalance || 0;
        transactions.forEach((tx) => {
          if (tx.date > cutoff) return;
          if (tx.type === "income" && tx.pocketId === p.id) bal += tx.amount;
          else if (tx.type === "expense" && tx.pocketId === p.id) bal -= tx.amount;
          else if (tx.type === "transfer" || tx.type === "exchange") { if (tx.fromPocketId === p.id) bal -= tx.fromAmount; if (tx.toPocketId === p.id) bal += tx.toAmount; }
          else if (tx.type === "loan_out" && tx.pocketId === p.id) bal -= tx.amount;
          else if (tx.type === "loan_return" && tx.pocketId === p.id) bal += tx.amount;
          else if (tx.type === "debt_take" && tx.pocketId === p.id) bal += tx.amount;
          else if (tx.type === "debt_repay" && tx.pocketId === p.id) bal -= tx.amount;
        });
        total += convert(bal, p.currency, baseCurrency, rates);
      });
      arr.push({ month: MONTHS_UA[d.getMonth()], value: Math.round(total) });
    }
    return arr;
  }, [pockets, transactions, baseCurrency, rates]);

  /* ---------- loans & debts ---------- */
  const loanRemaining = (loan) => Math.max(0, Math.round((loan.amount - loan.returned) * 100) / 100);
  const activeLoansAll = loans.filter((l) => l.status !== "returned" && !l.archived);
  const activeLoans = activeLoansAll.filter((l) => l.direction !== "in");
  const activeDebts = activeLoansAll.filter((l) => l.direction === "in");
  const totalLoanedOut = activeLoans.reduce((s, l) => s + convert(loanRemaining(l), l.currency, baseCurrency, rates), 0);
  const totalOwed = activeDebts.reduce((s, l) => s + convert(loanRemaining(l), l.currency, baseCurrency, rates), 0);
  const overdueLoans = activeLoans.filter((l) => new Date(l.dueDate) < now);
  const overdueDebts = activeDebts.filter((l) => new Date(l.dueDate) < now);
  const overdueTotal = overdueLoans.reduce((s, l) => s + convert(loanRemaining(l), l.currency, baseCurrency, rates), 0);
  const upcomingLoans = [...activeLoans].filter((l) => new Date(l.dueDate) >= now).sort((a, b) => new Date(a.dueDate) - new Date(b.dueDate)).slice(0, 3);

  /* ============================== ACTIONS ============================== */

  const addAccountWithPocket = (accData, currency, initialBalance, pocketName) => {
    const account = { id: uid("acc"), archived: false, createdAt: new Date().toISOString().slice(0, 10), ...accData };
    const pocket = { id: uid("pk"), accountId: account.id, currency, initialBalance: parseFloat(initialBalance) || 0, name: (pocketName || "").trim(), archived: false };
    update({ accounts: [...accounts, account], pockets: [...pockets, pocket] });
    notify(tr("Рахунок створено"));
  };
  const editAccount = (id, patch) => update({ accounts: accounts.map((a) => (a.id === id ? { ...a, ...patch } : a)) });
  const archiveAccount = (id) => update({ accounts: accounts.map((a) => (a.id === id ? { ...a, archived: !a.archived } : a)) });
  // Delete account + its pockets, but KEEP transactions (they remain in history, labelled tr("Видалений рахунок"))
  const deleteAccount = (id) => {
    update({ accounts: accounts.filter((a) => a.id !== id), pockets: pockets.filter((p) => p.accountId !== id) });
    notify(tr("Рахунок видалено (операції збережено)"));
  };
  // Move account "fromId" to the position of "toId" in the accounts array
  const reorderAccounts = (fromId, toId) => {
    if (fromId === toId) return;
    const arr = [...accounts];
    const from = arr.findIndex((a) => a.id === fromId);
    const to = arr.findIndex((a) => a.id === toId);
    if (from < 0 || to < 0) return;
    const moved = arr.splice(from, 1)[0];
    arr.splice(to, 0, moved);
    update({ accounts: arr });
  };

  const addPocket = (accountId, currency, initialBalance, name) => {
    update({ pockets: [...pockets, { id: uid("pk"), accountId, currency, initialBalance: parseFloat(initialBalance) || 0, name: (name || "").trim(), archived: false }] });
    notify(tr("Валютний субрахунок додано"));
  };
  const editPocket = (id, patch) => update({ pockets: pockets.map((p) => (p.id === id ? { ...p, ...patch } : p)) });
  const archivePocket = (id) => update({ pockets: pockets.map((p) => (p.id === id ? { ...p, archived: !p.archived } : p)) });
  // Delete a single currency card, keeping its transactions in history
  const deletePocket = (id) => { update({ pockets: pockets.filter((p) => p.id !== id) }); notify(tr("Картку видалено (операції збережено)")); };
  // Reorder cards: swap a pocket with its nearest active neighbour in the given direction (-1 left, +1 right)
  const movePocket = (id, dir) => {
    const arr = [...pockets];
    const idx = arr.findIndex((p) => p.id === id);
    if (idx < 0) return;
    let j = idx + dir;
    while (j >= 0 && j < arr.length && arr[j].archived) j += dir;
    if (j < 0 || j >= arr.length) return;
    const tmp = arr[idx]; arr[idx] = arr[j]; arr[j] = tmp;
    update({ pockets: arr });
  };

  const addCategory = (data) => update({ categories: [...categories, { id: uid("cat"), archived: false, parentId: null, ...data }] });
  const editCategory = (id, patch) => update({ categories: categories.map((c) => (c.id === id ? { ...c, ...patch } : c)) });
  const archiveCategory = (id) => update({ categories: categories.map((c) => (c.id === id ? { ...c, archived: !c.archived } : c)) });

  const addTransaction = (tx) => { update({ transactions: [{ id: uid("tx"), createdAt: new Date().toISOString(), fx: (tx.currency ? (rates[tx.currency] || 1) : 1), ...tx }, ...transactions] }); notify(tr("Операцію збережено")); };
  const editTransaction = (id, patch) => update({ transactions: transactions.map((t) => (t.id === id ? { ...t, ...patch } : t)) });
  const deleteTransaction = (id) => { update({ transactions: transactions.filter((t) => t.id !== id) }); notify(tr("Операцію видалено")); };
  const duplicateTransaction = (tx) => { update({ transactions: [{ ...tx, id: uid("tx"), createdAt: new Date().toISOString(), date: new Date().toISOString().slice(0, 10) }, ...transactions] }); notify(tr("Операцію дубльовано")); };

  const addLoan = (loan, sourcePocketId, amount, currency, note) => {
    const isDebt = loan.direction === "in";
    const newLoan = { id: uid("loan"), status: "active", returned: 0, direction: loan.direction || "out", ...loan };
    const tx = { id: uid("tx"), type: isDebt ? "debt_take" : "loan_out", date: loan.dateGiven, amount, currency, pocketId: sourcePocketId, loanId: newLoan.id, note: note || ((isDebt ? tr("Позика (борг) від: ") : tr("Позика: ")) + loan.borrower) };
    update({ loans: [newLoan, ...loans], transactions: [tx, ...transactions] });
    notify(isDebt ? tr("Борг додано") : tr("Позику створено"));
  };

  const registerLoanReturn = (loanId, returnAmount, returnPocketId, currency, date, note) => {
    const loan = loans.find((l) => l.id === loanId);
    if (!loan) return;
    const isDebt = loan.direction === "in";
    const remaining = loanRemaining(loan);
    const amt = Math.min(returnAmount, remaining);
    const newReturned = Math.round((loan.returned + amt) * 100) / 100;
    const newStatus = newReturned >= loan.amount - 0.005 ? "returned" : "partial";
    update({
      loans: loans.map((l) => (l.id === loanId ? { ...l, returned: newReturned, status: newStatus } : l)),
      transactions: [{ id: uid("tx"), type: isDebt ? "debt_repay" : "loan_return", date, amount: amt, currency, pocketId: returnPocketId, loanId, note: note || ((isDebt ? tr("Погашення боргу: ") : tr("Повернення позики: ")) + loan.borrower) }, ...transactions],
    });
    notify(newStatus === "returned" ? (isDebt ? tr("Борг повністю погашено") : tr("Позику повністю повернено")) : (isDebt ? tr("Часткове погашення зареєстровано") : tr("Часткове повернення зареєстровано")));
  };

  const editLoan = (id, patch) => update({ loans: loans.map((l) => (l.id === id ? { ...l, ...patch } : l)) });
  const archiveLoan = (id) => { update({ loans: loans.map((l) => (l.id === id ? { ...l, archived: !l.archived } : l)) }); };
  // Delete the loan record but keep its transactions in history (balances stay intact)
  const deleteLoan = (id) => { update({ loans: loans.filter((l) => l.id !== id) }); notify(tr("Позику видалено (операції збережено)")); };

  const addReminder = (data) => { update({ reminders: [{ id: uid("rem"), done: false, ...data }, ...reminders] }); notify(tr("Нагадування створено")); };
  const editReminder = (id, patch) => update({ reminders: reminders.map((r) => (r.id === id ? { ...r, ...patch } : r)) });
  const deleteReminder = (id) => { update({ reminders: reminders.filter((r) => r.id !== id) }); notify(tr("Нагадування видалено")); };

  const addGoal = (data) => { update({ goals: [{ id: uid("goal"), saved: 0, archived: false, createdAt: new Date().toISOString().slice(0, 10), ...data }, ...goals] }); notify(tr("Ціль створено")); };
  const editGoal = (id, patch) => update({ goals: goals.map((g) => (g.id === id ? { ...g, ...patch } : g)) });
  const deleteGoal = (id) => { update({ goals: goals.filter((g) => g.id !== id) }); notify(tr("Ціль видалено")); };
  const contributeGoal = (id, delta) => { update({ goals: goals.map((g) => (g.id === id ? { ...g, saved: Math.max(0, Math.round((((g.saved || 0) + delta)) * 100) / 100) } : g)) }); notify(delta >= 0 ? tr("Ціль поповнено") : tr("Кошти знято")); };

  const addCrypto = (data) => { update({ crypto: [{ id: uid("cx"), note: "", ...data }, ...crypto] }); notify(tr("Актив додано")); };
  const editCrypto = (id, patch) => update({ crypto: crypto.map((c) => (c.id === id ? { ...c, ...patch } : c)) });
  const deleteCrypto = (id) => { update({ crypto: crypto.filter((c) => c.id !== id) }); notify(tr("Актив видалено")); };
  const refreshCryptoPrices = async () => {
    const ids = Array.from(new Set(crypto.map((c) => c.coinId))).filter(Boolean);
    if (ids.length === 0) return { ok: true };
    try {
      const resp = await fetch("https://api.coingecko.com/api/v3/simple/price?ids=" + ids.join(",") + "&vs_currencies=usd");
      const data = await resp.json();
      if (!data || typeof data !== "object") throw new Error("bad");
      const prices = { ...cryptoPrices };
      ids.forEach((id) => { if (data[id] && typeof data[id].usd === "number") prices[id] = data[id].usd; });
      update({ cryptoPrices: prices, cryptoUpdatedAt: new Date().toISOString() });
      return { ok: true };
    } catch (e) { return { ok: false }; }
  };
  const cryptoValueUSD = (c) => (c.amount || 0) * (cryptoPrices[c.coinId] || 0);
  const cryptoTotalUSD = crypto.reduce((s, c) => s + cryptoValueUSD(c), 0);
  const cryptoTotalBase = convert(cryptoTotalUSD, "USD", baseCurrency, rates);
  const toggleReminderDone = (id) => update({ reminders: reminders.map((r) => (r.id === id ? { ...r, done: !r.done } : r)) });

  const overdueReminders = reminders.filter((r) => !r.done && new Date(r.date) < new Date(new Date().setHours(0, 0, 0, 0)));

  const applyPin = (v) => { savePin(v); setPinState(v); };
  const applyPinDelay = (sec) => { savePinDelay(sec); setPinDelayState(sec); };

  const exportBackup = async () => {
    try {
      const payload = { ...state, theme, _app: "AiMyFinance", _v: 2, _exportedAt: new Date().toISOString() };
      const res = await saveFile("k3-backup-" + new Date().toISOString().slice(0, 10) + ".json", JSON.stringify(payload, null, 2), "application/json");
      if (res !== "cancelled") notify(res === "downloaded" ? tr("Резервну копію збережено") : tr("Резервну копію збережено"));
    } catch (e) { notify(tr("Не вдалося створити копію")); }
  };

  const exportCSV = async () => {
    try {
      const catName = (id) => (categories.find((c) => c.id === id) || {}).name || "";
      const typeLbl = { income: tr("Дохід"), expense: tr("Витрата"), transfer: tr("Переказ"), exchange: tr("Обмін валют"), loan_out: tr("Позика видана"), loan_return: tr("Повернення позики") };
      const rows = [[tr("Дата"), tr("Тип"), tr("Сума"), tr("Валюта"), tr("Категорія"), tr("Рахунок"), tr("Нотатка")]];
      transactions.slice().sort((a, b) => (a.date < b.date ? 1 : -1)).forEach((t) => {
        const amt = t.amount != null ? t.amount : (t.fromAmount != null ? t.fromAmount : "");
        const cur = t.currency || t.fromCurrency || "";
        const pk = pocketLabel(t.pocketId || t.fromPocketId);
        rows.push([t.date, typeLbl[t.type] || t.type, amt, cur, catName(t.categoryId), pk, (t.note || "").replace(/[\r\n]+/g, " ")]);
      });
      const csv = rows.map((r) => r.map((cell) => { const s = String(cell); return /[",;\n]/.test(s) ? '"' + s.replace(/"/g, '""') + '"' : s; }).join(",")).join("\n");
      const res = await saveFile("k3-transactions-" + new Date().toISOString().slice(0, 10) + ".csv", "\ufeff" + csv, "text/csv;charset=utf-8");
      if (res !== "cancelled") notify(res === "downloaded" ? tr("CSV експортовано") : tr("CSV збережено"));
    } catch (e) { notify(tr("Не вдалося створити CSV")); }
  };

  const importBackup = (file) => {
    const reader = new FileReader();
    reader.onload = function () {
      try {
        const obj = JSON.parse(reader.result);
        if (!obj || !obj.accounts || !obj.pockets) { notify(tr("Файл не схожий на резервну копію")); return; }
        setState({ accounts: obj.accounts, pockets: obj.pockets, categories: obj.categories || [], transactions: obj.transactions || [], loans: obj.loans || [], rates: obj.rates || rates, baseCurrency: obj.baseCurrency || baseCurrency, reminders: obj.reminders || [] });
        if (obj.theme) setTheme(obj.theme);
        notify(tr("Дані відновлено з копії"));
      } catch (e) { notify(tr("Не вдалося прочитати файл")); }
    };
    reader.readAsText(file);
  };

  /* ============================== NAV ============================== */

  const NAV_ITEMS = [
    { id: "dashboard", label: tr("Огляд"), icon: LayoutDashboard },
    { id: "accounts", label: tr("Рахунки"), icon: Wallet },
    { id: "history", label: tr("Історія"), icon: HistoryIcon },
    { id: "loans", label: tr("Позики"), icon: Banknote },
    { id: "categories", label: tr("Категорії"), icon: Tags },
    { id: "settings", label: tr("Налаштування"), icon: SettingsIcon },
  ];
  const MOBILE_NAV = NAV_ITEMS.filter((n) => ["dashboard", "accounts", "history", "loans"].includes(n.id));
  const vars = themeVars(theme);

  return (
    <div style={{ ...vars, background: "var(--bg)", color: "var(--text)", fontFamily: "'Inter', system-ui, sans-serif", minHeight: "100vh" }}>
      <style>{`
        @import url('https://fonts.googleapis.com/css2?family=Sora:wght@500;600;700;800&family=Inter:wght@400;500;600;700&display=swap');
        .font-display { font-family: 'Sora', system-ui, sans-serif; }
        .tabular { font-variant-numeric: tabular-nums; }
        ::-webkit-scrollbar { height: 6px; width: 6px; }
        ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 999px; }
        .snap-x { scroll-snap-type: x mandatory; }
        .snap-card { scroll-snap-align: start; }
        @keyframes fadeSlideUp { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }
        .animate-in { animation: fadeSlideUp 0.28s ease both; }
        @keyframes k3spin { to { transform: rotate(360deg); } }
        .spin { animation: k3spin 0.9s linear infinite; }
        .lucide { stroke-width: 1.5; }
        .bank-card { position: relative; border-radius: 20px; padding: 20px; overflow: hidden; background: linear-gradient(155deg, #2B3757 0%, #1A2742 42%, #0E1626 100%); box-shadow: inset 0 1px 0 rgba(255,255,255,0.06), var(--card-shadow, 0 8px 20px rgba(0,0,0,0.3)); }
        .bank-card::after { content: ""; position: absolute; left: 0; right: 0; bottom: 0; height: 3px; background: var(--card-accent, var(--accent)); }
        .bank-card-glow { position: absolute; width: 170px; height: 170px; border-radius: 999px; right: -55px; top: -70px; opacity: 0.18; background: radial-gradient(circle, #C9A362, transparent 68%); pointer-events: none; }
        .pill-link { display: inline-flex; align-items: center; gap: 4px; padding: 6px 12px; border-radius: 999px; font-size: 12px; font-weight: 500; background: var(--surface2); color: var(--text-dim); border: 1px solid var(--border); }
        .mono-circle { width: 52px; height: 52px; border-radius: 999px; display: flex; align-items: center; justify-content: center; background: #141D30; box-shadow: 0 2px 8px rgba(0,0,0,0.25); flex-shrink: 0; }
      `}</style>

      <div className="flex">
        <aside className="hidden md:flex flex-col w-60 shrink-0 h-screen sticky top-0 border-r px-4 py-6" style={{ borderColor: "var(--border)" }}>
          <div className="flex items-center px-2 mb-8">
            <Wordmark size={24} sub={true} />
          </div>
          <nav className="flex-1 space-y-1">
            {NAV_ITEMS.map((item) => {
              const Ic = item.icon;
              const active = view === item.id;
              const badge = item.id === "loans" ? (overdueLoans.length + overdueDebts.length) : 0;
              return (
                <button key={item.id} onClick={() => setView(item.id)} className="w-full flex items-center gap-3 px-3 py-2.5 rounded-xl text-sm font-medium transition-all" style={{ background: active ? "var(--surface2)" : "transparent", color: active ? "var(--accent)" : "var(--text-dim)" }}>
                  <span className="relative flex items-center">
                    <Ic size={18} />
                    {badge > 0 && (
                      <span className="absolute -top-1.5 -right-2 min-w-[16px] h-4 px-1 rounded-full flex items-center justify-center text-[10px] font-bold leading-none" style={{ background: "var(--danger)", color: "#fff" }}>{badge}</span>
                    )}
                  </span>
                  {item.label}
                </button>
              );
            })}
          </nav>

/* Renders a <select> of all active pockets, grouped by parent account */
function PocketSelect({ accounts, pockets, value, onChange, excludePocketId, className }) {
  const activeAccounts = accounts.filter((a) => !a.archived);
  return (
    <Select value={value} onChange={(e) => onChange(e.target.value)} className={className}>
      {activeAccounts.map((acc) => {
        const accPockets = pockets.filter((p) => p.accountId === acc.id && !p.archived && p.id !== excludePocketId);
        if (accPockets.length === 0) return null;
        return (
          <optgroup key={acc.id} label={tr(acc.name)}>
            {accPockets.map((p) => <option key={p.id} value={p.id}>{p.name ? `${tr(p.name)} · ${p.currency}` : `${tr(acc.name)} · ${p.currency}`}</option>)}
          </optgroup>
        );
      })}
    </Select>
  );
}

/* ============================== CHARTS (dependency-free) ============================== */

function DonutChart({ data, size = 150, thickness = 26 }) {
  const total = data.reduce((s, d) => s + d.value, 0) || 1;
  const r = (size - thickness) / 2;
  const cx = size / 2, cy = size / 2;
  const C = 2 * Math.PI * r;
  let acc = 0;
  return (
    <svg width={size} height={size} viewBox={`0 0 ${size} ${size}`} style={{ flexShrink: 0 }}>
      <circle cx={cx} cy={cy} r={r} fill="none" stroke="var(--surface2)" strokeWidth={thickness} />
      <g transform={`rotate(-90 ${cx} ${cy})`}>
        {data.map((d, i) => {
          const len = (d.value / total) * C;
          const el = (
            <circle key={i} cx={cx} cy={cy} r={r} fill="none" stroke={d.color}
              strokeWidth={thickness} strokeDasharray={`${len} ${C - len}`} strokeDashoffset={-acc} strokeLinecap="butt" />
          );
          acc += len;
          return el;
        })}
      </g>
    </svg>
  );
}

function MiniBars({ data, height = 190 }) {
  const values = [];
  data.forEach((d) => { values.push(d.income, d.expense); });
  const max = Math.max(1, ...values);
  const labelH = 22;
  const barsH = height - labelH;
  return (
    <div style={{ width: "100%" }}>
      <div style={{ display: "flex", alignItems: "flex-end", gap: 8, height: barsH }}>
        {data.map((d, i) => (
          <div key={i} style={{ flex: 1, display: "flex", alignItems: "flex-end", justifyContent: "center", gap: 3, height: "100%" }}>
            <div style={{ width: 10, height: `${Math.max(2, (d.income / max) * 100)}%`, background: "var(--accent)", borderRadius: "4px 4px 0 0" }} />
            <div style={{ width: 10, height: `${Math.max(2, (d.expense / max) * 100)}%`, background: "var(--danger)", borderRadius: "4px 4px 0 0" }} />
          </div>
        ))}
      </div>
      <div style={{ display: "flex", gap: 8, marginTop: 6 }}>
        {data.map((d, i) => (
          <div key={i} style={{ flex: 1, textAlign: "center", fontSize: 11, color: "var(--text-dim)" }}>{tr(d.month)}</div>
        ))}
      </div>
    </div>
  );
}

// Dependency-free area/line chart for the net-worth trend
function TrendArea({ data, height = 130 }) {
  if (!data || data.length === 0) return null;
  const vals = data.map((d) => d.value);
  const max = Math.max.apply(null, vals);
  const min = Math.min.apply(null, vals);
  const range = (max - min) || 1;
  const W = 320, H = height, pad = 10, topPad = 12;
  const n = data.length;
  const x = (i) => pad + (i * (W - pad * 2)) / (n - 1 || 1);
  const y = (v) => H - pad - ((v - min) / range) * (H - pad - topPad);
  const pts = data.map((d, i) => [x(i), y(d.value)]);
  const line = pts.map((p, i) => (i === 0 ? "M" : "L") + p[0].toFixed(1) + " " + p[1].toFixed(1)).join(" ");
  const area = line + " L" + pts[n - 1][0].toFixed(1) + " " + (H - pad) + " L" + pts[0][0].toFixed(1) + " " + (H - pad) + " Z";
  return (
    <div style={{ width: "100%" }}>
      <svg viewBox={`0 0 ${W} ${H}`} width="100%" height={H} preserveAspectRatio="none" style={{ display: "block", overflow: "visible" }}>
        <defs>
          <linearGradient id="twGold" x1="0" y1="0" x2="0" y2="1">
            <stop offset="0" stopColor="#C9A362" stopOpacity="0.32" />
            <stop offset="1" stopColor="#C9A362" stopOpacity="0" />
          </linearGradient>
        </defs>
        <path d={area} fill="url(#twGold)" />
        <path d={line} fill="none" stroke="#C9A362" strokeWidth="2.2" strokeLinejoin="round" strokeLinecap="round" vectorEffect="non-scaling-stroke" />
      </svg>
      <div style={{ display: "flex", marginTop: 6 }}>
        {data.map((d, i) => (
          <div key={i} style={{ flex: 1, textAlign: "center", fontSize: 11, color: "var(--text-dim)" }}>{tr(d.month)}</div>
        ))}
      </div>
    </div>
  );
}

  /* ---- period selector for the income/expense/net widget ---- */
  const [period, setPeriod] = useState("month");
  const [customFrom, setCustomFrom] = useState("");
  const [customTo, setCustomTo] = useState("");
  const nowD = new Date();
  const isoD = (d) => d.toISOString().slice(0, 10);
  let pStart = "", pEnd = "";
  if (period === "day") { pStart = isoD(nowD); pEnd = isoD(nowD); }
  else if (period === "month") { pStart = isoD(new Date(nowD.getFullYear(), nowD.getMonth(), 1)); pEnd = isoD(new Date(nowD.getFullYear(), nowD.getMonth() + 1, 0)); }
  else if (period === "year") { pStart = isoD(new Date(nowD.getFullYear(), 0, 1)); pEnd = isoD(new Date(nowD.getFullYear(), 11, 31)); }
  else { pStart = customFrom; pEnd = customTo; }
  const inRange = (d) => (!pStart || d >= pStart) && (!pEnd || d <= pEnd);
  const periodTx = transactions.filter((t) => (t.type === "income" || t.type === "expense") && inRange(t.date));
  const periodIncome = periodTx.filter((t) => t.type === "income").reduce((s, t) => s + txToBase(t, baseCurrency, rates), 0);
  const periodExpense = periodTx.filter((t) => t.type === "expense").reduce((s, t) => s + txToBase(t, baseCurrency, rates), 0);
  const periodNet = periodIncome - periodExpense;
  const periodLabel = period === "day" ? tr("за сьогодні") : period === "month" ? tr("за місяць") : period === "year" ? tr("за рік") : tr("за період");
  const periodBreakdown = (() => {
    const m = {};
    periodTx.filter((t) => t.type === "expense").forEach((t) => {
      const cat = categories.find((c) => c.id === t.categoryId);
      const key = cat ? cat.name : tr("Інше");
      m[key] = (m[key] || 0) + txToBase(t, baseCurrency, rates);

      </div>

      <div data-tour="actions" className="grid grid-cols-2 sm:grid-cols-4 gap-3">

              <div className="space-y-1.5 flex-1 min-w-0">
                {periodBreakdown.slice(0, 5).map((c, i) => (
                  <div key={i} className="flex items-center justify-between text-xs gap-2">
                    <span className="flex items-center gap-1.5 truncate"><span className="w-2 h-2 rounded-full shrink-0" style={{ background: c.color }} />{tr(c.name)}</span>

            <span className="flex items-center gap-1.5"><span className="w-2 h-2 rounded-full" style={{ background: "var(--accent)" }} />{tr("Дохід")}</span>
            <span className="flex items-center gap-1.5"><span className="w-2 h-2 rounded-full" style={{ background: "var(--danger)" }} />{tr("Витрати")}</span>

        <Card data-tour="networth" className="p-4">
          <div className="flex items-center justify-between mb-3">
            <h3 className="font-display font-semibold text-sm">{tr("Динаміка капіталу")}</h3>
