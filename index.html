      {budgetStatus && budgetStatus.length > 0 && (
        <Card data-tour="budgets" className="p-4">
          <h3 className="font-display font-semibold text-sm mb-3">{tr("Бюджети за місяць")}</h3>
          <div className="space-y-3.5">
            {budgetStatus.map((b) => {
              const over = b.pct > 100;
              const barColor = over ? "var(--danger)" : b.pct >= 80 ? "var(--warn)" : "var(--accent)";
              return (
                <div key={b.id}>
                  <div className="flex items-center justify-between text-xs mb-1.5 gap-2">
                    <span className="flex items-center gap-1.5 font-medium min-w-0"><Icon name={b.icon} size={13} style={{ color: b.color }} /><span className="truncate">{tr(b.name)}</span></span>
                    <span className="tabular shrink-0" style={{ color: over ? "var(--danger)" : "var(--text-dim)" }}>{fmtMoney(b.spent, baseCurrency)} / {fmtMoney(b.budget, baseCurrency)}</span>
                  </div>
                  <div className="h-2 rounded-full overflow-hidden" style={{ background: "var(--surface2)" }}>
                    <div style={{ width: Math.min(100, b.pct) + "%", height: "100%", background: barColor, borderRadius: 999, transition: "width .3s ease" }} />
                  </div>
                </div>
              );
            })}
          </div>
        </Card>
      )}

      {goals && goals.filter((g) => !g.archived).length > 0 && (
        <Card data-tour="goals" className="p-4">
          <div className="flex items-center justify-between mb-3">
            <h3 className="font-display font-semibold text-sm flex items-center gap-2"><PiggyBank size={16} /> {tr("Цілі накопичень")}</h3>
            <button onClick={() => setView("goals")} className="pill-link">{tr("Усі цілі")} <ChevronRight size={13} /></button>
          </div>
          <div className="space-y-3.5">
            {goals.filter((g) => !g.archived).slice(0, 3).map((g) => {
              const saved = g.saved || 0;
              const pct = g.target > 0 ? Math.min(100, (saved / g.target) * 100) : 0;
              return (
                <div key={g.id}>
                  <div className="flex items-center justify-between text-xs mb-1.5 gap-2">
                    <span className="font-medium truncate">{tr(g.name)}</span>
                    <span className="tabular shrink-0" style={{ color: "var(--text-dim)" }}>{fmtMoney(saved, g.currency)} / {fmtMoney(g.target, g.currency)}</span>
                  </div>
                  <div className="h-2 rounded-full overflow-hidden" style={{ background: "var(--surface2)" }}>
                    <div style={{ width: pct + "%", height: "100%", background: "var(--accent)", borderRadius: 999, transition: "width .3s ease" }} />
                  </div>
                </div>
              );
            })}
          </div>
        </Card>
      )}

      {crypto && crypto.length > 0 && (
        <Card className="p-4">
          <div className="flex items-center justify-between mb-3">
            <h3 className="font-display font-semibold text-sm flex items-center gap-2"><Coins size={16} /> {tr("Крипто-портфель")}</h3>
            <button onClick={() => setView("crypto")} className="pill-link">{tr("Відкрити")} <ChevronRight size={13} /></button>
          </div>
          <p className="font-display font-bold text-xl tabular mb-3">{fmtMoney(cryptoTotalBase || 0, baseCurrency)}</p>
          <div className="space-y-2.5">
            {crypto.slice(0, 3).map((c) => {
              const price = cryptoPrices[c.coinId] || 0;
              const valBase = convert((c.amount || 0) * price, "USD", baseCurrency, rates);
              return (
                <div key={c.id} className="flex items-center justify-between text-xs gap-2">
                  <span className="font-medium truncate">{c.amount} {c.symbol}</span>
                  <span className="tabular shrink-0" style={{ color: "var(--text-dim)" }}>{price > 0 ? fmtMoney(valBase, baseCurrency) : "—"}</span>
                </div>
              );
            })}
          </div>
        </Card>
      )}

      {activeLoans.length > 0 && (
        <Card className="p-4">
          <div className="flex items-center justify-between mb-3">
            <h3 className="font-display font-semibold text-sm flex items-center gap-2"><Banknote size={16} /> {tr("Позики надані")}</h3>
            <button onClick={() => setView("loans")} className="pill-link">{tr("Усі позики")} <ChevronRight size={13} /></button>
          </div>
          <div className="grid grid-cols-2 gap-3 mb-3">
            <div><p className="text-xs mb-1" style={{ color: "var(--text-dim)" }}>{tr("Загалом надано")}</p><p className="font-display font-bold tabular">{fmtMoney(totalLoanedOut, baseCurrency)}</p></div>
            <div><p className="text-xs mb-1" style={{ color: "var(--text-dim)" }}>{tr("Прострочено")}</p><p className="font-display font-bold tabular" style={{ color: overdueTotal > 0 ? "var(--danger)" : "var(--text)" }}>{fmtMoney(overdueTotal, baseCurrency)}</p></div>
          </div>
          {upcomingLoans.length > 0 && (
            <div className="space-y-1.5">
              {upcomingLoans.map((l) => (
                <div key={l.id} className="flex items-center justify-between text-xs">
                  <span style={{ color: "var(--text)" }}>{l.borrower}</span>
                  <span style={{ color: "var(--text-dim)" }}>{tr("до")} {fmtDate(l.dueDate)}</span>
                </div>
              ))}
            </div>
          )}
        </Card>
      )}

      <div>
        <div className="flex items-center justify-between mb-3">
          <h2 className="font-display font-semibold text-lg">{tr("Останні транзакції")}</h2>
          <button onClick={() => setView("history")} className="pill-link">{tr("Уся історія")} <ChevronRight size={13} /></button>
        </div>
        <Card className="divide-y" style={{ borderColor: "var(--border)" }}>
          {recent.map((tx) => <TxRow key={tx.id} tx={tx} categories={categories} pocketLabel={pocketLabel} />)}
          {recent.length === 0 && <p className="text-sm py-8 text-center" style={{ color: "var(--text-dim)" }}>{tr("Ще немає транзакцій")}</p>}
        </Card>
      </div>
    </div>
  );
}

function QuickAction({ icon: Ic, label, onClick }) {
  return (
    <button onClick={onClick} className="flex flex-col items-center gap-2">
      <div className="mono-circle"><Ic size={20} color="#fff" /></div>
      <span className="text-xs font-medium text-center leading-tight" style={{ color: "var(--text)" }}>{label}</span>
    </button>
  );
}

function PocketCard({ pocket, balance, onClick, onLongPress, className = "" }) {
  const acc = pocket.account;
  const typeInfo = ACCOUNT_TYPES.find((t) => t.id === acc.type);
  const masked = `•••• ${pocket.id.slice(-4).toUpperCase()}`;

  const pressTimer = React.useRef(null);
  const longFired = React.useRef(false);
  const startPress = () => {
    if (!onLongPress) return;
    longFired.current = false;
    pressTimer.current = setTimeout(() => { longFired.current = true; onLongPress(); }, 500);
  };
  const clearPress = () => { if (pressTimer.current) clearTimeout(pressTimer.current); };
  const handleClick = () => {
    if (longFired.current) { longFired.current = false; return; }
    if (onClick) onClick();
  };

  return (
    <div
      onClick={handleClick}
      onContextMenu={(e) => { if (onLongPress) { e.preventDefault(); onLongPress(); } }}
      onTouchStart={startPress} onTouchEnd={clearPress} onTouchMove={clearPress}
      onMouseDown={startPress} onMouseUp={clearPress} onMouseLeave={clearPress}
      className={`bank-card ${onClick ? "cursor-pointer active:scale-[0.98] transition-transform" : ""} ${className}`}
      style={{ "--card-accent": acc.color, WebkitTouchCallout: "none", WebkitUserSelect: "none" }}
    >
      <div className="bank-card-glow" />
      <div className="flex items-center justify-between gap-2 mb-8">
        <span className="flex items-center gap-1.5 text-[11px] font-medium min-w-0" style={{ color: "rgba(255,255,255,0.55)" }}>
          <Icon name={typeInfo?.icon} size={13} style={{ color: "rgba(255,255,255,0.55)" }} />
          <span className="truncate">{pocket.name ? pocket.name : typeInfo?.label}</span>
        </span>
        <span className="font-display font-bold shrink-0 leading-none" style={{ fontSize: 17, letterSpacing: "-0.02em", color: "rgba(255,255,255,0.96)" }}>
          K<sup style={{ color: "#C9A362", fontSize: "0.58em", fontWeight: 700, marginLeft: 1 }}>3</sup>
        </span>
      </div>
      <div className="flex items-baseline gap-2 flex-wrap">
        <p className="font-display font-bold text-2xl tabular text-white">{fmtMoney(balance, pocket.currency)}</p>
        <span className="text-[10px] font-semibold px-2 py-0.5 rounded-full" style={{ background: "rgba(255,255,255,0.12)", color: "#fff" }}>{pocket.currency}</span>
      </div>
      <p className="text-xs mt-1.5 tracking-wider" style={{ color: "rgba(255,255,255,0.35)", fontFamily: "monospace" }}>{masked}</p>
      <div className="flex items-center justify-between gap-2 mt-3">
        <p className="text-sm font-medium truncate" style={{ color: "rgba(255,255,255,0.75)" }}>{tr(acc.name)}</p>
        {acc.bank && <span className="text-[10px] font-medium px-2 py-0.5 rounded-full shrink-0" style={{ background: "rgba(201,163,98,0.18)", color: "#E7CF9B" }}>{acc.bank}</span>}
      </div>
    </div>
  );
}

function TxRow({ tx, categories, pocketLabel, onClick }) {
  let label = "", sub = "", amountStr = "", amountColor = "var(--text)";
  const cat = categories.find((c) => c.id === tx.categoryId);

  if (tx.type === "income") { label = cat?.name || tr("Дохід"); sub = pocketLabel(tx.pocketId); amountStr = `+${fmtMoney(tx.amount, tx.currency)}`; amountColor = "var(--accent)"; }
  else if (tx.type === "expense") { label = cat?.name || tr("Витрата"); sub = pocketLabel(tx.pocketId); amountStr = `−${fmtMoney(tx.amount, tx.currency)}`; amountColor = "var(--danger)"; }
  else if (tx.type === "transfer") { label = tr("Переказ"); sub = `${pocketLabel(tx.fromPocketId)} → ${pocketLabel(tx.toPocketId)}`; amountStr = `${fmtMoney(tx.fromAmount, tx.fromCurrency)}`; amountColor = "var(--accent2)"; }
  else if (tx.type === "exchange") { label = tr("Обмін валюти"); sub = `${pocketLabel(tx.fromPocketId)} → ${pocketLabel(tx.toPocketId)}`; amountStr = `${fmtMoney(tx.fromAmount, tx.fromCurrency)} → ${fmtMoney(tx.toAmount, tx.toCurrency)}`; amountColor = "var(--warn)"; }
  else if (tx.type === "loan_out") { label = tr("Позика надана"); sub = tx.note || pocketLabel(tx.pocketId); amountStr = `−${fmtMoney(tx.amount, tx.currency)}`; amountColor = "var(--warn)"; }
  else if (tx.type === "loan_return") { label = tr("Повернення позики"); sub = tx.note || pocketLabel(tx.pocketId); amountStr = `+${fmtMoney(tx.amount, tx.currency)}`; amountColor = "var(--accent)"; }

  const TypeIcon = tx.type === "transfer" ? ArrowLeftRight : tx.type === "exchange" ? RefreshCw : tx.type === "loan_out" ? ArrowUpRight : tx.type === "loan_return" ? ArrowDownRight : (ICONS[cat?.icon] || MoreHorizontal);

  return (
    <div onClick={onClick} className={`flex items-center gap-3 px-4 py-3 ${onClick ? "cursor-pointer hover:opacity-80" : ""}`}>
      <div className="w-9 h-9 rounded-full flex items-center justify-center shrink-0" style={{ background: "var(--surface2)" }}><TypeIcon size={16} style={{ color: "var(--text-dim)" }} /></div>
      <div className="min-w-0 flex-1"><p className="text-sm font-medium truncate">{label}</p><p className="text-xs truncate" style={{ color: "var(--text-dim)" }}>{sub}</p></div>
      <div className="text-right shrink-0"><p className="text-sm font-semibold tabular" style={{ color: amountColor }}>{amountStr}</p><p className="text-[11px]" style={{ color: "var(--text-dim)" }}>{fmtDate(tx.date)}</p></div>
    </div>
  );
}

/* ============================== ACCOUNTS VIEW ============================== */

function AccountsView({ accounts, accountPockets, pocketBalance, accountTotalBase, baseCurrency, setModal, archiveAccount, archivePocket, deleteAccount, reorderAccounts, setView, cryptoTotalBase, cryptoCount }) {
  const [showArchived, setShowArchived] = useState(false);
  const [expanded, setExpanded] = useState({});
  const [confirmDel, setConfirmDel] = useState(null);
  const [dragId, setDragId] = useState(null);
  const dragIdRef = React.useRef(null);
  const lastOverRef = React.useRef(null);
  const listRef = React.useRef(null);
  const reorderRef = React.useRef(reorderAccounts);
  reorderRef.current = reorderAccounts;
  const list = accounts.filter((a) => (showArchived ? a.archived : !a.archived));

  const toggle = (id) => setExpanded((e) => ({ ...e, [id]: !e[id] }));

  const beginDrag = (id) => { dragIdRef.current = id; lastOverRef.current = id; setDragId(id); };
  const endDrag = () => { dragIdRef.current = null; lastOverRef.current = null; setDragId(null); };
  const considerOver = (overId) => {
    const from = dragIdRef.current;
    if (!from || !overId || overId === from || lastOverRef.current === overId) return;
    lastOverRef.current = overId;
    reorderRef.current(from, overId);
  };

  React.useEffect(() => {
    const el = listRef.current;
    if (!el) return;
    const onMove = (e) => {
      if (!dragIdRef.current) return;
      e.preventDefault();
      const t = e.touches ? e.touches[0] : e;
      const target = document.elementFromPoint(t.clientX, t.clientY);
      const row = target && target.closest ? target.closest("[data-acc-row]") : null;
      if (row) considerOver(row.getAttribute("data-acc-row"));
    };
    const onEnd = () => { if (dragIdRef.current) endDrag(); };
    el.addEventListener("touchmove", onMove, { passive: false });
    window.addEventListener("touchend", onEnd);
    window.addEventListener("touchcancel", onEnd);
    return () => {
      el.removeEventListener("touchmove", onMove);
      window.removeEventListener("touchend", onEnd);
      window.removeEventListener("touchcancel", onEnd);
    };
  }, []);

  return (
    <div className="space-y-5 animate-in">
      <div className="flex items-center justify-between">
        <h1 className="font-display font-bold text-2xl">{tr("Рахунки")}</h1>
        <Button onClick={() => setModal({ type: "account" })}><Plus size={16} /> {tr("Новий рахунок")}</Button>
      </div>
      <div className="flex gap-2 text-sm">
        <button onClick={() => setShowArchived(false)} className="px-3 py-1.5 rounded-lg font-medium" style={{ background: !showArchived ? "var(--surface2)" : "transparent", color: !showArchived ? "var(--text)" : "var(--text-dim)" }}>{tr("Активні")}</button>
        <button onClick={() => setShowArchived(true)} className="px-3 py-1.5 rounded-lg font-medium" style={{ background: showArchived ? "var(--surface2)" : "transparent", color: showArchived ? "var(--text)" : "var(--text-dim)" }}>{tr("Архів")}</button>
      </div>
      {!showArchived && list.length > 1 && (
        <p data-tour="acclist" className="text-xs" style={{ color: "var(--text-dim)" }}>{tr("Перетягни за ручку")} <span style={{ verticalAlign: "middle" }}>⠿</span>{tr(", щоб змінити порядок рахунків.")}</p>
      )}
      <div ref={listRef} className="space-y-4">
        {list.map((acc) => {
          const pks = accountPockets(acc.id, true).filter((p) => showArchived ? true : true);
          const isOpen = expanded[acc.id] ?? true;
          return (
            <div
              key={acc.id}
              data-acc-row={acc.id}
              onDragOver={(e) => { if (dragIdRef.current) { e.preventDefault(); considerOver(acc.id); } }}
              onDragEnd={endDrag}
              style={{ opacity: dragId === acc.id ? 0.4 : 1, transition: "opacity .15s" }}
            >
            <Card className="p-5" style={dragId === acc.id ? { borderColor: "var(--accent)" } : {}}>
              <div className="flex items-start gap-2">
                {!showArchived && (
                  <span
                    draggable
                    onDragStart={(e) => { beginDrag(acc.id); if (e.dataTransfer) e.dataTransfer.effectAllowed = "move"; }}
                    onTouchStart={(e) => { e.stopPropagation(); beginDrag(acc.id); }}
                    onClick={(e) => e.stopPropagation()}
                    className="p-1 -ml-1 mt-1 shrink-0 cursor-grab active:cursor-grabbing"
                    style={{ color: "var(--text-dim)", touchAction: "none" }}
                    title={tr("Перетягнути")}
                  ><GripVertical size={16} /></span>
                )}
                <button onClick={() => toggle(acc.id)} className="flex-1 min-w-0 flex items-start justify-between mb-1">
                  <div className="flex items-center gap-3 min-w-0">
                    <div className="w-10 h-10 rounded-xl flex items-center justify-center shrink-0" style={{ background: `${acc.color}22` }}>
                      <Icon name={ACCOUNT_TYPES.find((t) => t.id === acc.type)?.icon} size={18} style={{ color: acc.color }} />
                    </div>
                    <div className="text-left min-w-0">
                      <p className="text-sm font-semibold truncate">{tr(acc.name)}</p>
                      <p className="text-xs mt-0.5" style={{ color: "var(--text-dim)" }}>{tr(ACCOUNT_TYPES.find((t) => t.id === acc.type)?.label)} · {pks.filter(p=>!p.archived).length} {tr(pks.filter(p=>!p.archived).length === 1 ? "валюта" : "валют")}</p>
                    </div>
                  </div>
                  <div className="flex items-center gap-2 shrink-0 pl-2">
                    <p className="font-display font-bold text-base tabular">{fmtMoney(accountTotalBase(acc.id), baseCurrency)}</p>
                    <ChevronDown size={16} style={{ color: "var(--text-dim)", transform: isOpen ? "rotate(180deg)" : "none", transition: "transform .15s" }} />
                  </div>
                </button>
              </div>
              <div className="flex items-center gap-1 mb-3">
                <button onClick={() => setModal({ type: "account", payload: acc })} className="p-1.5 rounded-lg" style={{ color: "var(--text-dim)" }}><Edit3 size={14} /></button>
                <button onClick={() => archiveAccount(acc.id)} className="p-1.5 rounded-lg" style={{ color: "var(--text-dim)" }}><Archive size={14} /></button>
                <button onClick={() => setConfirmDel(confirmDel === acc.id ? null : acc.id)} className="p-1.5 rounded-lg" style={{ color: "var(--danger)" }}><Trash2 size={14} /></button>
                {confirmDel === acc.id && (
                  <div className="flex items-center gap-2 ml-1">
                    <span className="text-xs" style={{ color: "var(--text-dim)" }}>{tr("Видалити рахунок?")}</span>
                    <button onClick={() => { deleteAccount(acc.id); setConfirmDel(null); }} className="text-xs font-semibold px-2 py-1 rounded-md" style={{ background: "var(--danger)", color: "#fff" }}>{tr("Так")}</button>
                    <button onClick={() => setConfirmDel(null)} className="text-xs font-medium px-2 py-1 rounded-md" style={{ background: "var(--surface2)", color: "var(--text)" }}>{tr("Ні")}</button>
                  </div>
                )}
                {acc.bank && confirmDel !== acc.id && <span className="ml-auto text-[10px] font-medium px-2 py-0.5 rounded-md shrink-0" style={{ background: "var(--surface2)", color: "var(--accent)" }}>{acc.bank}</span>}
              </div>
              {isOpen && (
                <div className="space-y-2 pt-2 border-t" style={{ borderColor: "var(--border)" }}>
                  {pks.map((p) => (
                    <div key={p.id} onClick={() => setModal({ type: "pocketDetail", payload: p.id })} className={`flex items-center justify-between gap-2 py-2 px-3 rounded-xl cursor-pointer hover:opacity-90 ${p.archived ? "opacity-50" : ""}`} style={{ background: "var(--surface2)" }}>
                      <div className="flex items-center gap-2 min-w-0">
                        <Badge color={acc.color}>{p.currency}</Badge>
                        {p.name && <span className="text-xs font-medium truncate" style={{ color: "var(--text)" }}>{tr(p.name)}</span>}
                      </div>
                      <p className="font-semibold text-sm tabular shrink-0">{fmtMoney(pocketBalance(p.id), p.currency)}</p>
                      <div className="flex gap-2 shrink-0">
                        <button onClick={(e) => { e.stopPropagation(); setModal({ type: "pocket", payload: { accountId: acc.id, existing: p } }); }} className="p-1 rounded-md" style={{ color: "var(--text-dim)" }}><Edit3 size={13} /></button>
                        <button onClick={(e) => { e.stopPropagation(); archivePocket(p.id); }} className="p-1 rounded-md" style={{ color: "var(--text-dim)" }}><Archive size={13} /></button>
                      </div>
                    </div>
                  ))}
                  {!showArchived && (
                    <button onClick={() => setModal({ type: "pocket", payload: { accountId: acc.id } })} className="w-full flex items-center justify-center gap-2 py-2 rounded-xl border-2 border-dashed text-xs font-medium" style={{ borderColor: "var(--border)", color: "var(--text-dim)" }}>
                      <Plus size={14} /> {tr("Додати валютний субрахунок")}
                    </button>
                  )}
                </div>
              )}
            </Card>
            </div>
          );
        })}
        {list.length === 0 && <p className="text-sm text-center py-10" style={{ color: "var(--text-dim)" }}>{tr("Немає рахунків у цій категорії")}</p>}
      </div>

      {!showArchived && (
        <button data-tour="cryptocard" onClick={() => setView && setView("crypto")} className="w-full text-left">
          <Card className="p-4 flex items-center gap-3" style={{ background: "linear-gradient(135deg, #1A2338 0%, #10192B 100%)", border: "1px solid var(--border)" }}>
            <div className="w-10 h-10 rounded-xl flex items-center justify-center shrink-0" style={{ background: "rgba(201,163,98,0.16)" }}><Coins size={18} style={{ color: "var(--accent)" }} /></div>
            <div className="min-w-0 flex-1">
              <p className="text-sm font-semibold" style={{ color: "#F3F0E8" }}>{tr("Крипто-портфель")}</p>
              <p className="text-xs" style={{ color: "#A7B0C4" }}>{cryptoCount > 0 ? `${cryptoCount} ${tr(cryptoCount === 1 ? "актив" : "активи")} · ${tr("живі ціни")}` : tr("Додати активи · живі ціни")}</p>
            </div>
            <div className="flex items-center gap-2 shrink-0">
              <p className="font-display font-bold text-base tabular" style={{ color: "#F3F0E8" }}>{fmtMoney(cryptoTotalBase || 0, baseCurrency)}</p>
              <ChevronRight size={16} style={{ color: "#A7B0C4" }} />
            </div>
          </Card>
        </button>
      )}
    </div>
  );
}

/* ============================== HISTORY VIEW ============================== */

function HistoryView({ transactions, pockets, accounts, categories, getPocket, pocketLabel, deleteTransaction, duplicateTransaction, setModal, currencies }) {
  const [search, setSearch] = useState("");
  const [filterType, setFilterType] = useState("all");
  const [filterPocket, setFilterPocket] = useState("all");
  const [filterCategory, setFilterCategory] = useState("all");
  const [filterCurrency, setFilterCurrency] = useState("all");
  const [dateFrom, setDateFrom] = useState("");
  const [dateTo, setDateTo] = useState("");
  const [showFilters, setShowFilters] = useState(false);

  const filtered = useMemo(() => {
    return transactions.filter((t) => {
      if (filterType !== "all" && t.type !== filterType) return false;
      if (filterPocket !== "all") {
        const match = t.pocketId === filterPocket || t.fromPocketId === filterPocket || t.toPocketId === filterPocket;
        if (!match) return false;
      }
      if (filterCategory !== "all" && t.categoryId !== filterCategory) return false;
      if (filterCurrency !== "all") {
        const curMatch = t.currency === filterCurrency || t.fromCurrency === filterCurrency || t.toCurrency === filterCurrency;
        if (!curMatch) return false;
      }
      if (dateFrom && t.date < dateFrom) return false;
      if (dateTo && t.date > dateTo) return false;
      if (search) {
        const hay = `${t.note || ""} ${pocketLabel(t.pocketId || t.fromPocketId)}`.toLowerCase();
        if (!hay.includes(search.toLowerCase())) return false;
      }
      return true;
    }).sort(byRecent);
  }, [transactions, filterType, filterPocket, filterCategory, filterCurrency, dateFrom, dateTo, search, pocketLabel]);

  const typeLabel = { all: tr("Усі типи"), income: tr("Доходи"), expense: tr("Витрати"), transfer: tr("Перекази"), exchange: tr("Обмін валют"), loan_out: tr("Позики надані"), loan_return: tr("Повернення позик") };

  return (
    <div className="space-y-4 animate-in">
      <div className="flex items-center justify-between">
        <h1 className="font-display font-bold text-2xl">{tr("Історія операцій")}</h1>
        <button onClick={() => setShowFilters(!showFilters)} className="p-2 rounded-lg border" style={{ borderColor: "var(--border)", color: "var(--text-dim)" }}><Filter size={16} /></button>
      </div>

      <div className="relative">
        <Search size={16} className="absolute left-3 top-1/2 -translate-y-1/2" style={{ color: "var(--text-dim)" }} />
        <Input data-tour="histsearch" placeholder={tr("Пошук за описом...")} value={search} onChange={(e) => setSearch(e.target.value)} className="pl-9" />
      </div>

      {showFilters && (
        <Card className="p-4 grid sm:grid-cols-2 lg:grid-cols-3 gap-3">
          <Field label={tr("Тип операції")}>
            <Select value={filterType} onChange={(e) => setFilterType(e.target.value)}>
              {Object.entries(typeLabel).map(([k, v]) => <option key={k} value={k}>{v}</option>)}
            </Select>
          </Field>
          <Field label={tr("Рахунок")}>
            <Select value={filterPocket} onChange={(e) => setFilterPocket(e.target.value)}>
              <option value="all">{tr("Усі рахунки")}</option>
              {accounts.map((acc) => pockets.filter((p) => p.accountId === acc.id).map((p) => (
                <option key={p.id} value={p.id}>{tr(acc.name)} · {p.currency}</option>
              )))}
            </Select>
          </Field>
          <Field label={tr("Категорія")}>
            <Select value={filterCategory} onChange={(e) => setFilterCategory(e.target.value)}>
              <option value="all">{tr("Усі категорії")}</option>
              {categories.map((c) => <option key={c.id} value={c.id}>{tr(c.name)}</option>)}
            </Select>
          </Field>
          <Field label={tr("Валюта")}>
            <Select value={filterCurrency} onChange={(e) => setFilterCurrency(e.target.value)}>
              <option value="all">{tr("Усі валюти")}</option>
              {(currencies || CURRENCIES).map((c) => <option key={c} value={c}>{c}</option>)}
            </Select>
          </Field>
          <Field label={tr("Період від")}><Input type="date" value={dateFrom} onChange={(e) => setDateFrom(e.target.value)} /></Field>
          <Field label={tr("Період до")}><Input type="date" value={dateTo} onChange={(e) => setDateTo(e.target.value)} /></Field>
        </Card>
      )}

      <Card className="divide-y overflow-hidden" style={{ borderColor: "var(--border)" }}>
        {filtered.map((tx) => {
          const acts = [];
          if (tx.type === "income" || tx.type === "expense") acts.push({ icon: Edit3, label: tr("Ред."), bg: "var(--surface2)", fg: "#C9A362", onClick: () => setModal({ type: "transaction", payload: { kind: tx.type, editing: tx } }) });
          acts.push({ icon: Plus, label: tr("Копія"), bg: "var(--surface2)", fg: "var(--text-dim)", onClick: () => duplicateTransaction(tx) });
          acts.push({ icon: Trash2, label: tr("Видал."), bg: "var(--danger)", fg: "#fff", onClick: () => deleteTransaction(tx.id) });
          return (
            <SwipeRow key={tx.id} actions={acts}>
              <div className="group flex items-center" style={{ background: "var(--surface)" }}>
                <div className="flex-1 min-w-0"><TxRow tx={tx} categories={categories} pocketLabel={pocketLabel} /></div>
                <div className="hidden group-hover:flex items-center gap-2 pr-4 shrink-0">
                  {(tx.type === "income" || tx.type === "expense") && (
                    <button onClick={() => setModal({ type: "transaction", payload: { kind: tx.type, editing: tx } })} className="p-1.5 rounded-lg" style={{ color: "var(--text-dim)" }}><Edit3 size={14} /></button>
                  )}
                  <button onClick={() => duplicateTransaction(tx)} className="p-1.5 rounded-lg" style={{ color: "var(--text-dim)" }}><Plus size={14} /></button>
                  <button onClick={() => deleteTransaction(tx.id)} className="p-1.5 rounded-lg" style={{ color: "var(--danger)" }}><Trash2 size={14} /></button>
                </div>
              </div>
            </SwipeRow>
          );
        })}
        {filtered.length === 0 && <p className="text-sm py-10 text-center" style={{ color: "var(--text-dim)" }}>{tr("Немає операцій за заданими фільтрами")}</p>}
      </Card>
    </div>
  );
}

/* ============================== LOANS VIEW ============================== */

function LoansView({ loans, pockets, getPocket, setModal, loanRemaining, archiveLoan, deleteLoan }) {
  const [dir, setDir] = useState("out");
  const [showArchived, setShowArchived] = useState(false);
  const isIn = dir === "in";
  const byDir = loans.filter((l) => (isIn ? l.direction === "in" : l.direction !== "in"));
  const active = byDir.filter((l) => l.status !== "returned" && !l.archived);
  const done = byDir.filter((l) => l.status === "returned" || l.archived);
  const overdueCount = active.filter((l) => new Date(l.dueDate) < new Date()).length;
  const list = showArchived ? done : active;

  const statusInfo = {
    active: { label: tr("Активна"), color: "var(--accent2)" },
    partial: { label: isIn ? tr("Частково погашена") : tr("Частково повернена"), color: "var(--warn)" },
    returned: { label: isIn ? tr("Погашена") : tr("Повернена"), color: "var(--accent)" },
    overdue: { label: tr("Прострочена"), color: "var(--danger)" },
  };
  const effectiveStatus = (l) => {
    if (l.status === "returned") return "returned";
    if (new Date(l.dueDate) < new Date()) return "overdue";
    return l.status;
  };

  return (
    <div className="space-y-5 animate-in">
      <div className="flex items-center justify-between gap-2 flex-wrap">
        <h1 className="font-display font-bold text-2xl">{tr("Позики та борги")}</h1>
        <Button onClick={() => setModal({ type: "loan", payload: { direction: dir } })}><Plus size={16} /> {isIn ? tr("Додати борг") : tr("Надати позику")}</Button>
      </div>

      <div data-tour="loandir" className="flex gap-1.5 p-1 rounded-xl" style={{ background: "var(--surface2)" }}>
        <button onClick={() => setDir("out")} className="flex-1 px-3 py-2 rounded-lg text-sm font-medium transition" style={{ background: !isIn ? "var(--surface)" : "transparent", color: !isIn ? "var(--text)" : "var(--text-dim)" }}>{tr("Мені винні")}</button>
        <button onClick={() => setDir("in")} className="flex-1 px-3 py-2 rounded-lg text-sm font-medium transition" style={{ background: isIn ? "var(--surface)" : "transparent", color: isIn ? "var(--text)" : "var(--text-dim)" }}>{tr("Я винен")}</button>
      </div>

      <div className="flex gap-2 text-sm">
        <button onClick={() => setShowArchived(false)} className="px-3 py-1.5 rounded-lg font-medium inline-flex items-center gap-2" style={{ background: !showArchived ? "var(--surface2)" : "transparent", color: !showArchived ? "var(--text)" : "var(--text-dim)" }}>
          {tr("Активні")} ({active.length})
          {overdueCount > 0 && <span className="min-w-[16px] h-4 px-1 rounded-full flex items-center justify-center text-[10px] font-bold leading-none" style={{ background: "var(--danger)", color: "#fff" }}>{overdueCount}</span>}
        </button>
        <button onClick={() => setShowArchived(true)} className="px-3 py-1.5 rounded-lg font-medium" style={{ background: showArchived ? "var(--surface2)" : "transparent", color: showArchived ? "var(--text)" : "var(--text-dim)" }}>{tr("Архів")} ({done.length})</button>
      </div>

      <div className="grid sm:grid-cols-2 gap-4">
        {list.map((loan) => {
          const st = effectiveStatus(loan);
          const remaining = loanRemaining(loan);
          const days = daysBetween(new Date(), loan.dueDate);
          const pk = getPocket(loan.pocketId);
          const loanActs = [
            { icon: Edit3, label: tr("Ред."), bg: "var(--surface2)", fg: "#C9A362", onClick: () => setModal({ type: "loanEdit", payload: loan }) },
            { icon: Archive, label: loan.archived ? tr("Актив.") : tr("Архів"), bg: "var(--surface2)", fg: "var(--text-dim)", onClick: () => archiveLoan(loan.id) },
            { icon: Trash2, label: tr("Видал."), bg: "var(--danger)", fg: "#fff", onClick: () => deleteLoan(loan.id) },
          ];
          return (
            <SwipeRow key={loan.id} actions={loanActs} rounded={true}>
            <Card className="p-5" style={{ background: "var(--surface)" }}>
              <div className="flex items-start justify-between mb-3 gap-2">
                <div className="flex items-center gap-2 min-w-0">
                  <div className="w-9 h-9 rounded-full flex items-center justify-center shrink-0" style={{ background: "var(--surface2)" }}><Users size={16} style={{ color: "var(--text-dim)" }} /></div>
                  <div className="min-w-0">
                    <p className="text-sm font-semibold truncate">{tr(loan.borrower)}</p>
                    <p className="text-xs truncate" style={{ color: "var(--text-dim)" }}>{tr(loan.note)}</p>
                  </div>
                </div>
                <Badge color={statusInfo[st].color}>{statusInfo[st].label}</Badge>
              </div>
              <div className="grid grid-cols-2 gap-3 text-sm mb-3">
                <div><p className="text-xs" style={{ color: "var(--text-dim)" }}>{isIn ? tr("Сума боргу") : tr("Початкова сума")}</p><p className="font-semibold tabular">{fmtMoney(loan.amount, loan.currency)}</p></div>
                <div><p className="text-xs" style={{ color: "var(--text-dim)" }}>{isIn ? tr("Залишок до сплати") : tr("Залишок боргу")}</p><p className="font-semibold tabular" style={{ color: remaining > 0 ? "var(--warn)" : "var(--accent)" }}>{fmtMoney(remaining, loan.currency)}</p></div>
                <div><p className="text-xs" style={{ color: "var(--text-dim)" }}>{isIn ? tr("Погашено") : tr("Повернено")}</p><p className="font-semibold tabular">{fmtMoney(loan.returned, loan.currency)}</p></div>
                <div><p className="text-xs" style={{ color: "var(--text-dim)" }}>{isIn ? tr("Термін сплати") : tr("Дата повернення")}</p><p className="font-semibold">{fmtDate(loan.dueDate)}</p></div>
              </div>
              <p className="text-xs mb-1" style={{ color: "var(--text-dim)" }}>{isIn ? tr("Отримано на: ") : tr("Видано з: ")}{pk ? `${pk.account?.name} · ${pk.currency}` : "—"}</p>
              <p className="text-xs mb-3" style={{ color: days < 0 ? "var(--danger)" : "var(--text-dim)" }}>
                {days === 0 ? tr("Строк сьогодні") : days > 0 ? tr(`Залишилось ${days} дн.`) : tr(`Прострочено на ${Math.abs(days)} дн.`)}
              </p>
              {loan.status !== "returned" && (
                <Button variant="secondary" className="w-full" onClick={() => setModal({ type: "loanReturn", payload: loan })}>{isIn ? tr("Зареєструвати погашення") : tr("Зареєструвати повернення")}</Button>
              )}
            </Card>
            </SwipeRow>
          );
        })}
        {list.length === 0 && <p className="text-sm col-span-full text-center py-10" style={{ color: "var(--text-dim)" }}>{isIn ? tr("Немає боргів у цій категорії") : tr("Немає позик у цій категорії")}</p>}
      </div>
    </div>
  );
}

        <button onClick={() => setTab("income")} className="px-3 py-1.5 rounded-lg font-medium" style={{ background: tab === "income" ? "var(--surface2)" : "transparent", color: tab === "income" ? "var(--text)" : "var(--text-dim)" }}>{tr("Доходи")}</button>

/* ============================== GOALS ============================== */

function GoalsView({ goals, setModal, baseCurrency, rates }) {
  const active = goals.filter((g) => !g.archived);
  const totalTarget = active.reduce((s, g) => s + convert(g.target, g.currency, baseCurrency, rates), 0);
  const totalSaved = active.reduce((s, g) => s + convert(g.saved || 0, g.currency, baseCurrency, rates), 0);
  return (
    <div className="space-y-5 animate-in max-w-2xl">
      <div className="flex items-center justify-between">
        <h1 className="font-display font-bold text-2xl">{tr("Цілі накопичень")}</h1>
        <Button onClick={() => setModal({ type: "goal", payload: null })}><Plus size={16} /> {tr("Нова ціль")}</Button>
      </div>
      {active.length > 0 && (
        <Card className="p-4 flex items-center justify-between">
          <span className="text-sm" style={{ color: "var(--text-dim)" }}>{tr("Накопичено загалом")}</span>
          <span className="font-display font-bold tabular text-sm">{fmtMoney(totalSaved, baseCurrency)} / {fmtMoney(totalTarget, baseCurrency)}</span>
        </Card>
      )}
      <div className="grid sm:grid-cols-2 gap-4">
        {active.map((g) => {
          const saved = g.saved || 0;
          const pct = g.target > 0 ? Math.min(100, (saved / g.target) * 100) : 0;
          const done = g.target > 0 && saved >= g.target;
          const remaining = Math.max(0, g.target - saved);
          return (
            <Card key={g.id} className="p-5">
              <div className="flex items-start justify-between mb-3 gap-2">
                <div className="min-w-0">
                  <p className="text-sm font-semibold flex items-center gap-1.5">{done && <Check size={14} style={{ color: "var(--accent)" }} />}<span className="truncate">{tr(g.name)}</span></p>
                  {g.note && <p className="text-xs truncate" style={{ color: "var(--text-dim)" }}>{tr(g.note)}</p>}
                </div>
                <button onClick={() => setModal({ type: "goal", payload: g })} className="p-1.5 rounded-lg shrink-0" style={{ color: "var(--text-dim)" }}><Edit3 size={14} /></button>
              </div>
              <p className="font-display font-bold text-xl tabular mb-2">{fmtMoney(saved, g.currency)} <span className="text-sm font-medium" style={{ color: "var(--text-dim)" }}>/ {fmtMoney(g.target, g.currency)}</span></p>
              <div className="h-2.5 rounded-full overflow-hidden mb-2" style={{ background: "var(--surface2)" }}>
                <div style={{ width: pct + "%", height: "100%", background: "var(--accent)", borderRadius: 999, transition: "width .3s ease" }} />
              </div>
              <div className="flex items-center justify-between text-xs mb-3">
                <span className="font-semibold" style={{ color: "var(--accent)" }}>{Math.round(pct)}%</span>
                <span style={{ color: "var(--text-dim)" }}>{done ? tr("Ціль досягнута 🎉") : tr("Залишилось ") + fmtMoney(remaining, g.currency)}</span>
              </div>
              <Button variant="secondary" className="w-full" onClick={() => setModal({ type: "goalContribute", payload: g })}>{tr("Поповнити")}</Button>
            </Card>
          );
        })}
        {active.length === 0 && <p className="text-sm col-span-full text-center py-10" style={{ color: "var(--text-dim)" }}>{tr("Ще немає цілей. Створіть першу — і відстежуйте прогрес накопичень.")}</p>}
      </div>
    </div>
  );
}

function GoalModal({ onClose, existing, addGoal, editGoal, deleteGoal, currencies }) {
  const isEdit = existing && existing.id;
  const [name, setName] = useState(existing?.name || "");
  const [target, setTarget] = useState(existing?.target != null ? String(existing.target) : "");
  const [currency, setCurrency] = useState(existing?.currency || "UAH");
  const [saved, setSaved] = useState(existing?.saved != null ? String(existing.saved) : "0");
  const [note, setNote] = useState(existing?.note || "");
  const [error, setError] = useState("");
  const [confirmDel, setConfirmDel] = useState(false);
  const submit = () => {
    if (!name.trim()) return setError(tr("Введіть назву цілі"));
    const t = parseFloat(target);
    if (!(t > 0)) return setError(tr("Вкажіть суму цілі"));
    const data = { name: name.trim(), target: t, currency, saved: Math.max(0, parseFloat(saved) || 0), note: note.trim() };
    if (isEdit) editGoal(existing.id, data); else addGoal(data);
    onClose();
  };
  return (
    <Modal title={isEdit ? tr("Редагувати ціль") : tr("Нова ціль")} onClose={onClose}>
      <Field label={tr("Назва")} error={error}><Input value={name} onChange={(e) => { setName(e.target.value); setError(""); }} placeholder={tr("Напр. Відпустка")} /></Field>
      <div className="grid grid-cols-3 gap-2">
        <div className="col-span-2"><Field label={tr("Сума цілі")}><Input type="number" inputMode="decimal" value={target} onChange={(e) => { setTarget(e.target.value); setError(""); }} placeholder="0" /></Field></div>
        <Field label={tr("Валюта")}><Select value={currency} onChange={(e) => setCurrency(e.target.value)}>{(currencies || CURRENCIES).map((c) => <option key={c} value={c}>{c}</option>)}</Select></Field>
      </div>
      <Field label={tr("Вже накопичено")}><Input type="number" inputMode="decimal" value={saved} onChange={(e) => setSaved(e.target.value)} placeholder="0" /></Field>
      <Field label={tr("Нотатка (необовʼязково)")}><Input value={note} onChange={(e) => setNote(e.target.value)} /></Field>
      <Button className="w-full mt-2" onClick={submit}>{isEdit ? tr("Зберегти") : tr("Створити ціль")}</Button>
      {isEdit && (confirmDel ? (
        <div className="flex items-center justify-between mt-3 text-sm">
          <span style={{ color: "var(--text-dim)" }}>{tr("Видалити ціль?")}</span>
          <div className="flex gap-2">
            <button onClick={() => { deleteGoal(existing.id); onClose(); }} className="px-3 py-1.5 rounded-lg text-xs font-medium" style={{ background: "var(--danger)", color: "#fff" }}>{tr("Так")}</button>
            <button onClick={() => setConfirmDel(false)} className="px-3 py-1.5 rounded-lg text-xs font-medium" style={{ background: "var(--surface2)", color: "var(--text)" }}>{tr("Ні")}</button>
          </div>
        </div>
      ) : (
        <button onClick={() => setConfirmDel(true)} className="w-full text-center mt-3 text-xs font-medium" style={{ color: "var(--danger)" }}>{tr("Видалити ціль")}</button>
      ))}
    </Modal>
  );
}

function GoalContributeModal({ onClose, goal, contributeGoal }) {
  const [amount, setAmount] = useState("");
  const [mode, setMode] = useState("add");
  const submit = () => {
    const a = parseFloat(amount);
    if (!(a > 0)) return;
    contributeGoal(goal.id, mode === "add" ? a : -a);
    onClose();
  };
  const saved = goal.saved || 0;
  return (
    <Modal title={goal.name} onClose={onClose}>
      <p className="text-sm mb-3" style={{ color: "var(--text-dim)" }}>{tr("Накопичено:")} <b style={{ color: "var(--text)" }}>{fmtMoney(saved, goal.currency)}</b> {tr("з")} {fmtMoney(goal.target, goal.currency)}</p>
      <div className="flex gap-2 mb-3">
        <button onClick={() => setMode("add")} className="flex-1 px-3 py-2 rounded-lg text-sm font-medium" style={{ background: mode === "add" ? "var(--accent)" : "var(--surface2)", color: mode === "add" ? "var(--accent-ink)" : "var(--text)" }}>{tr("Поповнити")}</button>
        <button onClick={() => setMode("withdraw")} className="flex-1 px-3 py-2 rounded-lg text-sm font-medium" style={{ background: mode === "withdraw" ? "var(--danger)" : "var(--surface2)", color: mode === "withdraw" ? "#fff" : "var(--text)" }}>{tr("Зняти")}</button>
      </div>
      <Field label={`Сума (${goal.currency})`}><Input type="number" inputMode="decimal" value={amount} onChange={(e) => setAmount(e.target.value)} placeholder="0" /></Field>
      <Button className="w-full mt-2" onClick={submit}>{mode === "add" ? tr("Поповнити ціль") : tr("Зняти кошти")}</Button>
    </Modal>
  );
}

function CryptoView({ crypto, cryptoPrices, cryptoUpdatedAt, baseCurrency, rates, setModal, refreshCryptoPrices, setToast }) {
  const [busy, setBusy] = useState(false);
  // Auto-load live prices on open if some are missing or the cache is stale (>10 min),
  // so the portfolio value (and the total capital) reflect the market without a manual tap.
  useEffect(() => {
    const missing = crypto.some((c) => !(cryptoPrices[c.coinId] > 0));
    const stale = !cryptoUpdatedAt || (Date.now() - new Date(cryptoUpdatedAt).getTime()) > 10 * 60 * 1000;
    if (crypto.length > 0 && (missing || stale)) {
      setBusy(true);
      refreshCryptoPrices().then(() => setBusy(false)).catch(() => setBusy(false));
    }
  }, []);
  const valBase = (c) => convert((c.amount || 0) * (cryptoPrices[c.coinId] || 0), "USD", baseCurrency, rates);
  const total = crypto.reduce((s, c) => s + valBase(c), 0);
  const refresh = async () => {
    setBusy(true);
    const res = await refreshCryptoPrices();
    setBusy(false);
    if (setToast) setToast(res && res.ok ? tr("Ціни оновлено") : tr("Не вдалося оновити ціни"));
  };
  const fmtUpd = cryptoUpdatedAt ? new Date(cryptoUpdatedAt).toLocaleString(locale(), { day: "numeric", month: "short", hour: "2-digit", minute: "2-digit" }) : tr("ще не оновлювались");
  return (
    <div className="space-y-5 animate-in max-w-2xl">
      <div className="flex items-center justify-between gap-2 flex-wrap">
        <h1 className="font-display font-bold text-2xl">{tr("Крипто-портфель")}</h1>
        <Button onClick={() => setModal({ type: "crypto", payload: null })}><Plus size={16} /> {tr("Додати актив")}</Button>
      </div>
      <Card className="p-5" style={{ background: "linear-gradient(135deg, #1A2338 0%, #10192B 100%)" }}>
        <p className="text-xs mb-1" style={{ color: "#A7B0C4" }}>{tr("Загальна вартість портфелю")}</p>
        <p className="font-display font-extrabold text-3xl tabular" style={{ color: "#F3F0E8" }}>{fmtMoney(total, baseCurrency)}</p>
        <div className="flex items-center justify-between mt-3 gap-2 flex-wrap">
          <span className="text-[11px]" style={{ color: "#A7B0C4" }}>{tr("Оновлено: ")}{fmtUpd}</span>
          <Button variant="secondary" onClick={refresh} disabled={busy}><RefreshCw size={15} className={busy ? "spin" : ""} /> {busy ? tr("Оновлення…") : tr("Оновити ціни")}</Button>
        </div>
      </Card>
      <div className="space-y-3">
        {crypto.map((c) => {
          const price = cryptoPrices[c.coinId] || 0;
          const v = valBase(c);
          return (
            <Card key={c.id} className="p-4 flex items-center justify-between gap-3">
              <div className="flex items-center gap-3 min-w-0">
                <div className="w-10 h-10 rounded-full flex items-center justify-center shrink-0 font-display font-bold text-[11px]" style={{ background: "var(--surface2)", color: "var(--accent)" }}>{c.symbol}</div>
                <div className="min-w-0">
                  <p className="text-sm font-semibold truncate">{c.amount} {c.symbol}</p>
                  <p className="text-xs truncate" style={{ color: "var(--text-dim)" }}>{tr(c.name)}{price > 0 ? ` · ${fmtMoney(convert(price, "USD", baseCurrency, rates), baseCurrency)}` : ""}</p>
                </div>
              </div>
              <div className="flex items-center gap-2 shrink-0">
                <p className="font-display font-bold text-sm tabular">{price > 0 ? fmtMoney(v, baseCurrency) : "—"}</p>
                <button onClick={() => setModal({ type: "crypto", payload: c })} className="p-1.5 rounded-lg" style={{ color: "var(--text-dim)" }}><Edit3 size={14} /></button>
              </div>
            </Card>
          );
        })}
        {crypto.length === 0 && <p className="text-sm text-center py-10" style={{ color: "var(--text-dim)" }}>{tr("Портфель порожній. Додайте перший актив — і бачте його вартість за живими цінами.")}</p>}
      </div>
      <p className="text-[11px]" style={{ color: "var(--text-dim)" }}>{tr("Ціни надає CoinGecko й оновлюються за вашим запитом (потрібен інтернет). Кількість монет вводиться вручну.")}</p>
    </div>
  );
}

function CryptoModal({ onClose, existing, addCrypto, editCrypto, deleteCrypto }) {
  const isEdit = existing && existing.id;
  const [coinId, setCoinId] = useState(existing?.coinId || CRYPTO_COINS[0].id);
  const [amount, setAmount] = useState(existing?.amount != null ? String(existing.amount) : "");
  const [note, setNote] = useState(existing?.note || "");
  const [error, setError] = useState("");
  const [confirmDel, setConfirmDel] = useState(false);
  const submit = () => {
    const a = parseFloat(amount);
    if (!(a > 0)) return setError(tr("Вкажіть кількість"));
    const coin = CRYPTO_COINS.find((c) => c.id === coinId) || CRYPTO_COINS[0];
    const data = { coinId: coin.id, symbol: coin.symbol, name: coin.name, amount: a, note: note.trim() };
    if (isEdit) editCrypto(existing.id, data); else addCrypto(data);
    onClose();
  };
  return (
    <Modal title={isEdit ? tr("Редагувати актив") : tr("Додати крипто-актив")} onClose={onClose}>
      <Field label={tr("Монета")}>
        <Select value={coinId} onChange={(e) => setCoinId(e.target.value)}>{CRYPTO_COINS.map((c) => <option key={c.id} value={c.id}>{tr(c.name)} ({c.symbol})</option>)}</Select>
      </Field>
      <Field label={tr("Кількість")} error={error}><Input type="number" step="any" inputMode="decimal" value={amount} onChange={(e) => { setAmount(e.target.value); setError(""); }} placeholder={tr("напр. 0.5")} /></Field>
      <Field label={tr("Нотатка (необовʼязково)")}><Input value={note} onChange={(e) => setNote(e.target.value)} /></Field>
      <Button className="w-full mt-2" onClick={submit}>{isEdit ? tr("Зберегти") : tr("Додати")}</Button>
      {isEdit && (confirmDel ? (
        <div className="flex items-center justify-between mt-3 text-sm">
          <span style={{ color: "var(--text-dim)" }}>{tr("Видалити актив?")}</span>
          <div className="flex gap-2">
            <button onClick={() => { deleteCrypto(existing.id); onClose(); }} className="px-3 py-1.5 rounded-lg text-xs font-medium" style={{ background: "var(--danger)", color: "#fff" }}>{tr("Так")}</button>
            <button onClick={() => setConfirmDel(false)} className="px-3 py-1.5 rounded-lg text-xs font-medium" style={{ background: "var(--surface2)", color: "var(--text)" }}>{tr("Ні")}</button>
          </div>
        </div>
      ) : (
        <button onClick={() => setConfirmDel(true)} className="w-full text-center mt-3 text-xs font-medium" style={{ color: "var(--danger)" }}>{tr("Видалити актив")}</button>
      ))}
    </Modal>
  );
}

function SettingsView({ baseCurrency, rates, rateMode, update, session, setToast, pin, applyPin, pinDelay, applyPinDelay, exportBackup, importBackup, exportCSV, setView }) {
  const [localRates, setLocalRates] = useState(() => {
    const o = {};
    Object.keys(rates).forEach((k) => { o[k] = String(rates[k]); });
    return o;
  });
  const [base, setBase] = useState(baseCurrency);
  const [localRateMode, setLocalRateMode] = useState(() => Object.assign({}, rateMode || {}));
  const toggleRateMode = (c) => setLocalRateMode((m) => Object.assign({}, m, { [c]: (m[c] === "manual" ? "auto" : "manual") }));
  const [addCur, setAddCur] = useState("");
  const [crossFrom, setCrossFrom] = useState("USD");
  const [crossTo, setCrossTo] = useState("EUR");
  const activeCurs = ["UAH"].concat(Object.keys(localRates).filter((c) => c !== "UAH"));
  const addableCurs = ALL_CURRENCIES.filter((c) => !(c in localRates));
  const rateToUAH = (c) => (c === "UAH" ? 1 : (parseFloat(localRates[c]) || 0));
  const crossRate = (() => {
    const a = rateToUAH(crossFrom), b = rateToUAH(crossTo);
    return b > 0 ? a / b : 0;
  })();
  const addCurrency = () => { if (addCur && !(addCur in localRates)) { setLocalRates({ ...localRates, [addCur]: "" }); setAddCur(""); } };
  const [ratesBusy, setRatesBusy] = useState(false);
  const [ratesMsg, setRatesMsg] = useState("");
  const [ratesErr, setRatesErr] = useState(false);
  const updateRatesOnline = async () => {
    setRatesBusy(true); setRatesMsg(""); setRatesErr(false);
    try {
      const resp = await fetch("https://open.er-api.com/v6/latest/UAH");
      const data = await resp.json();
      if (!data || data.result !== "success" || !data.rates) throw new Error("bad");
      const newLocal = { ...localRates };
      const newRates = { UAH: 1 };
      Object.keys(localRates).forEach((c) => {
        if (c === "UAH") return;
        if (localRateMode[c] === "manual") { newRates[c] = parseFloat(localRates[c]) || 0; return; }
        const r = data.rates[c];
        if (r && r > 0) { const v = Math.round((1 / r) * 10000) / 10000; newLocal[c] = String(v); newRates[c] = v; }
        else { newRates[c] = parseFloat(localRates[c]) || 0; }
      });
      setLocalRates(newLocal);
      update({ rates: newRates, rateMode: localRateMode });
      setRatesMsg(tr("Оновлено: ") + new Date().toLocaleDateString(locale()));
      setToast && setToast(tr("Курси оновлено"));
    } catch (e) {
      setRatesErr(true); setRatesMsg(tr("Не вдалося оновити — перевірте інтернет"));
    } finally { setRatesBusy(false); }
  };
  const removeCurrency = (c) => { const r = { ...localRates }; delete r[c]; setLocalRates(r); if (base === c) setBase("UAH"); if (crossFrom === c) setCrossFrom("UAH"); if (crossTo === c) setCrossTo("UAH"); };
  const save = () => {
    const parsed = { UAH: 1 };
    Object.keys(localRates).forEach((k) => { if (k !== "UAH") parsed[k] = parseFloat(localRates[k]) || 0; });
    const finalBase = base === "UAH" || parsed[base] !== undefined ? base : "UAH";
    update({ rates: parsed, baseCurrency: finalBase, rateMode: localRateMode });
    setToast && setToast(tr("Налаштування збережено"));
  };

  const [pinMode, setPinMode] = useState(false);
  const [pin1, setPin1] = useState("");

  const [pinErr, setPinErr] = useState("");

    if (pin1 !== pin2) return setPinErr(tr("Коди не збігаються"));

    setPinMode(false); setPin1(""); setPin2(""); setPinErr("");
    setToast && setToast(tr("PIN-код увімкнено"));

        <p data-tour="setrates" className="text-xs mb-2" style={{ color: "var(--text-dim)" }}>{tr("Курси валют — скільки")} <b style={{ color: "var(--text)" }}>UAH</b> {tr("коштує 1 одиниця валюти. Позначка")} <b style={{ color: "var(--text)" }}>{tr("«Авто»")}</b> {tr("оновлюється онлайн,")} <b style={{ color: "var(--text)" }}>{tr("«Вручну»")}</b> {tr("— залишає ваше значення. Крос-курси рахуються автоматично.")}</p>
        <div className="flex items-center gap-2 mb-3 flex-wrap">
          <Button variant="secondary" onClick={updateRatesOnline} disabled={ratesBusy}><RefreshCw size={15} className={ratesBusy ? "spin" : ""} /> {ratesBusy ? tr("Оновлення…") : tr("Оновити курси онлайн")}</Button>
          {ratesMsg && <span className="text-[11px]" style={{ color: ratesErr ? "var(--danger)" : "var(--text-dim)" }}>{ratesMsg}</span>}
        </div>
        <div className="grid grid-cols-2 gap-3">
          {activeCurs.filter((c) => c !== "UAH").map((c) => (
            <div key={c}>
