        "Як імпортувати виписку з банку?": "How do I import a bank statement?",

        "Вивантажте з банку виписку у форматі CSV. Натисніть «Імпорт», оберіть рахунок і файл — застосунок сам розпізнає колонки (дата, сума, опис) і розкладе операції за категоріями. Мінус — витрата, плюс — дохід. Перевірте список, зніміть галочки із зайвого й підтвердіть.": "Export a CSV statement from your bank. Tap “Import”, choose the account and the file — the app detects the columns (date, amount, description) and sorts the transactions into categories. Minus = expense, plus = income. Review the list, untick anything extra and confirm.",

        "Сума всіх ваших рахунків і крипто у базовій валюті. Подвійний тап приховує суму від сторонніх очей.": "The total of all your accounts and crypto in the base currency. Double-tap to hide it from prying eyes.",

        "День, місяць, рік або свій діапазон дат. Доходи, витрати й діаграма перерахуються під обраний період.": "Day, month, year or a custom date range. Income, expenses and the chart recalculate for the period you pick.",
        "Задайте місячний ліміт у категорії витрат — тут зʼявиться прогрес: золотий у межах, жовтий біля межі, червоний при перевищенні.": "Set a monthly limit on an expense category and its progress appears here: gold within budget, amber near the limit, red when exceeded.",
        "Графік зростання капіталу за 6 місяців і зміна за останній місяць — щоб бачити тренд, а не лише поточну суму.": "A 6-month chart of your net worth plus the change this month — so you see the trend, not just today's number.",
        "Відпустка, техніка, подушка безпеки — ставте цілі, поповнюйте їх і стежте за прогресом.": "A holiday, new gadgets, a safety cushion — set goals, top them up and watch your progress.",
        "Рахунок — контейнер (картка, готівка, депозит). Усередині — валютні субрахунки з назвами. Перетягуйте за ручку, щоб змінити порядок.": "An account is a container (card, cash, deposit). Inside are named currency sub-accounts. Drag by the handle to reorder them.",
        "Додайте свої активи (BTC, ETH, SOL…) — вартість оновлюється за живими ринковими цінами й додається до капіталу.": "Add your assets (BTC, ETH, SOL…) — their value updates at live market prices and counts towards your total capital.",
        "Шукайте за описом і фільтруйте за типом, рахунком, категорією, валютою й датами. Свайп операції вліво відкриває дії: редагувати, копія, видалити.": "Search by description and filter by type, account, category, currency and dates. Swipe a row left for actions: edit, copy, delete.",
        "Перемикач «Мені винні» / «Я винен». Реєструйте видачу, часткові повернення й погашення — баланси оновлюються самі.": "The “Owed to me” / “I owe” switch. Record lending, partial returns and repayments — balances update automatically.",
        "Додавайте валюти, тримайте курс «Авто» (оновлюється онлайн) або «Вручну». Крос-курси рахуються автоматично.": "Add currencies and keep each rate “Auto” (updated online) or “Manual”. Cross rates are calculated automatically.",
